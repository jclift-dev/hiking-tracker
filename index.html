<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Via</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:    #012d1d;
    --primary-lt: #1b4332;
    --secondary:  #496173;
    --tertiary:   #7a0000;
    --green:      #1D9E75;
    --green-bg:   #e4f5ed;
    --green-dark: #0F6E56;
    --red:        #c0392b;
    --red-bg:     #faeaea;
    --blue:       #185FA5;
    --blue-bg:    #E6F1FB;
    --blue-dark:  #0d3d6e;
    --amber:      #854F0B;
    --amber-bg:   #FAEEDA;
    --gray:       #5F5E5A;
    --gray-bg:    #eeece6;
    --cycle:      #1062C0;
    --cycle-bg:   #ddeeff;
    --cycle-dark: #0a3d80;
    --ghost:      rgba(25,28,29,0.07);
    --border:     rgba(25,28,29,0.10);
    --surface:    #ffffff;
    --surface-low:#f3f4f5;
    --sec-container: #cce6fb;
    --page:       #f8f9fa;
    --text:       #191c1d;
    --muted:      #6b6b67;
    --radius:     20px;
    --radius-lg:  28px;
    --shadow:     0 2px 16px rgba(25,28,29,0.07), 0 1px 4px rgba(25,28,29,0.04);
    --shadow-lg:  0 12px 40px rgba(25,28,29,0.09), 0 2px 8px rgba(25,28,29,0.05);
  }
  body[data-land="cycle"] {
    --primary:    #0d2b45;
    --primary-lt: #1a4a6e;
    --sec-container: #cce3f5;
  }
  @media (prefers-color-scheme: dark) {
    body[data-land="cycle"] {
      --sec-container: #0a1e38;
    }
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface:    #1e1e1c;
      --surface-low:#181816;
      --sec-container: #1a2d3a;
      --page:       #111110;
      --text:       #e8e8e4;
      --muted:      #9a9a96;
      --ghost:      rgba(255,255,255,0.06);
      --border:     rgba(255,255,255,0.10);
      --gray-bg:    #252523;
      --green-bg:   #0a2a1e;
      --blue-bg:    #0a1e38;
      --amber-bg:   #2a1a06;
      --red-bg:     #2a0e0e;
      --cycle-bg:   #0a1e38;
      --shadow:     0 2px 16px rgba(0,0,0,0.3), 0 1px 4px rgba(0,0,0,0.2);
      --shadow-lg:  0 12px 40px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
      /* foreground text colors — lightened for readability on dark badge backgrounds */
      --green:      #3dcc96;
      --green-dark: #4dd6a3;
      --blue:       #6aadee;
      --blue-dark:  #5a9de0;
      --amber:      #e8a030;
      --gray:       #a8a8a4;
      --red:        #e07070;
      --cycle:      #7db4f0;
      --cycle-dark: #7db4f0;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--page); color: var(--text); font-size: 15px; line-height: 1.5; }
  a { color: var(--blue); }

  /* Layout */
  .app { max-width: 800px; margin: 0 auto; padding: 0 1rem 4rem; }

  /* Header — floating card */
  .header {
    position: relative;
    margin: 0.75rem 0 1.75rem;
    padding: 0;
    background: var(--primary);
    overflow: hidden;
    border-radius: var(--radius-lg);
    min-height: 260px;
    display: flex; flex-direction: column; justify-content: flex-end;
    transition: background 0.5s ease;
    box-shadow: var(--shadow-lg);
  }
  .header-bg-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center 20%;
    opacity: 0.55; mix-blend-mode: luminosity;
    pointer-events: none;
  }
  /* Bottom-up gradient overlay */
  .header::after {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(to top, var(--primary) 0%, rgba(1,45,29,0.7) 45%, rgba(1,45,29,0.15) 100%);
  }
  .header-inner {
    position: relative; z-index: 2; padding: 1.5rem 1.5rem 1.75rem;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 2rem;
  }
  .header-left { flex: 1; min-width: 0; }
  .header-right { flex-shrink: 0; }
  .header-eyebrow {
    font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.5); margin-bottom: 8px; font-family: 'Manrope', sans-serif;
  }
  .header h1 {
    font-family: 'Manrope', sans-serif;
    font-size: 64px; font-weight: 800; letter-spacing: -0.05em;
    color: #fff; line-height: 0.95;
    text-shadow: 0 2px 24px rgba(0,0,0,0.35);
  }
  .header p  { color: rgba(255,255,255,0.55); font-size: 13px; font-weight: 500; margin-top: 8px; letter-spacing: 0; text-transform: none; }
  /* Mountain silhouette */
  /* Top bar inside header — dark emerald band, three-column */
  .header-topbar {
    position: relative; z-index: 3;
    display: flex; align-items: center;
    padding: 0.85rem 1.25rem;
    background: rgba(1, 12, 7, 0.82);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }
  .header-topbar-left  { flex: 1; display: flex; align-items: center; }
  .header-topbar-center { flex: none; display: flex; align-items: center; gap: 2px; }
  .header-topbar-right { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
  .topbar-logo {
    font-family: 'Manrope', sans-serif; font-size: 18px; font-weight: 800;
    letter-spacing: 0.12em; color: #fff;
  }
  .header-nav-btn {
    padding: 6px 16px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
    border: none; border-radius: 0; background: transparent; color: rgba(255,255,255,0.45);
    cursor: pointer; transition: all 0.15s; font-family: 'Manrope', sans-serif;
    border-bottom: 2px solid transparent; padding-bottom: 4px;
  }
  .header-nav-btn:hover { color: rgba(255,255,255,0.85); }
  .header-nav-btn.active { color: #fff; border-bottom-color: rgba(165,208,185,0.85); }
  /* Hiking / Cycling pill toggle */
  .land-pill {
    display: flex; align-items: center; gap: 2px;
    background: rgba(255,255,255,0.08); border-radius: 99px; padding: 3px;
  }
  .land-pill-btn {
    padding: 3px 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
    border: none; border-radius: 99px; background: transparent; color: rgba(255,255,255,0.5);
    cursor: pointer; transition: all 0.18s; font-family: 'Manrope', sans-serif; white-space: nowrap; text-transform: uppercase;
  }
  .land-pill-btn:hover { color: rgba(255,255,255,0.85); }
  .land-pill-btn.active { background: #fff; color: var(--primary); font-weight: 800; }
  .header-controls {
    display: flex; gap: 8px; align-items: center; z-index: 3;
  }
  .header-user { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.55); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
  .signout-btn {
    width: 34px; height: 34px; border-radius: 10px;
    background: rgba(255,255,255,0.08); border: none;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; cursor: pointer; transition: all 0.15s;
    color: rgba(255,255,255,0.65);
  }
  .signout-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
  .settings-btn {
    width: 34px; height: 34px; border-radius: 10px;
    background: rgba(255,255,255,0.08); border: none;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer; transition: all 0.15s;
    color: rgba(255,255,255,0.65);
  }
  .settings-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
  .settings-btn.active { background: rgba(255,255,255,0.22); color: #fff; }

  /* Settings — modal overlay */
  .settings-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .settings-overlay.open { display: block; }
  .settings-panel {
    display: none; position: fixed; z-index: 201;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: var(--surface); border-radius: var(--radius-lg);
    padding: 1.5rem; width: min(380px, 90vw);
    box-shadow: var(--shadow-lg);
  }
  @media (prefers-color-scheme: dark) {
    .settings-panel { background: #1c1c1c; }
  }
  .settings-panel.open { display: block; }
  .settings-modal-hdr {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem;
  }
  .settings-modal-title { font-size: 16px; font-weight: 700; font-family: 'Manrope', sans-serif; }
  .settings-close-btn {
    width: 30px; height: 30px; border-radius: 8px; border: none;
    background: var(--ghost); color: var(--muted); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .settings-close-btn:hover { background: var(--gray-bg); color: var(--text); }
  .settings-section { margin-bottom: 1rem; }
  .settings-section:last-child { margin-bottom: 0; }
  .settings-label { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; font-family: 'Manrope', sans-serif; }
  .settings-label strong { color: var(--text); text-transform: none; letter-spacing: 0; font-size: 13px; font-family: 'Manrope', sans-serif; }
  .settings-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .settings-pill {
    padding: 5px 14px; font-size: 13px; border: none;
    border-radius: 99px; background: var(--gray-bg); color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .settings-pill:hover { background: var(--green-bg); color: var(--green-dark); }
  .settings-pill.active { background: var(--primary); color: #fff; font-weight: 500; }
  #sbb-slider { width: 100%; accent-color: var(--green); cursor: pointer; margin-top: 6px; display: block; }
  /* Routes / All Stages sub-view toggle */
  .subview-toggle {
    display: flex; gap: 2px; background: var(--ghost); border-radius: 10px; padding: 3px;
  }
  .subview-btn {
    padding: 5px 14px; font-size: 12px; font-weight: 600; border: none;
    border-radius: 8px; background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s; font-family: 'Manrope', sans-serif;
  }
  .subview-btn:hover { color: var(--text); }
  .subview-btn.active { background: var(--surface); color: var(--primary); font-weight: 700; box-shadow: var(--shadow); }

  /* Section dividers between hiking/cycling in list */
  .section-divider {
    font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--muted); margin: 1.5rem 0 0.75rem;
    font-family: 'Manrope', sans-serif;
    display: flex; align-items: center; gap: 10px;
  }
  .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--ghost); }
  .section-divider:first-child { margin-top: 0; }
  @media (prefers-color-scheme: dark) {
    .header { background: #010f09; }
    .header::after { background: linear-gradient(to top, #010f09 0%, rgba(1,15,9,0.8) 45%, rgba(1,15,9,0.1) 100%); }
  }

  /* Stats (right side of header) */
  .header-stats { display: flex; flex-direction: column; gap: 2px; align-items: flex-end; text-align: right; }
  .header-stat { padding: 0.3rem 0; }
  .header-stat-value { font-size: 26px; font-weight: 800; color: #fff; line-height: 1; font-family: 'Manrope', sans-serif; letter-spacing: -0.03em; }
  .header-stat-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.45); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.1em; }


  /* View toggle */
  .view-btn { padding: 6px 18px; font-size: 13px; font-weight: 500; border: none; border-radius: 10px; background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; box-shadow: 0 1px 3px rgba(25,28,29,0.06); flex-shrink: 0; }
  .view-btn:hover { color: var(--text); }
  .view-btn.active { background: var(--text); color: var(--surface); box-shadow: 0 2px 8px rgba(25,28,29,0.2); }

  /* Tabs + controls */
  .tabs { display: flex; gap: 5px; margin-bottom: 1rem; }
  .tab { padding: 6px 15px; font-size: 13px; border: none; border-radius: 99px; background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; box-shadow: 0 1px 3px rgba(25,28,29,0.06); }
  .tab:hover { background: var(--green-bg); color: var(--green-dark); }
  .tab.active { background: var(--primary); color: #fff; font-weight: 500; box-shadow: 0 2px 8px rgba(1,45,29,0.25); }

  .controls { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .controls input, .controls select {
    padding: 8px 12px; font-size: 14px; border: none; border-radius: 10px;
    background: var(--surface); color: var(--text); outline: none;
    box-shadow: 0 1px 3px rgba(25,28,29,0.07);
    transition: box-shadow 0.15s, background 0.15s;
  }
  .controls input { flex: 1; min-width: 200px; }
  .controls input:focus {
    background: var(--surface); box-shadow: 0 0 0 2px rgba(29,158,117,0.25), 0 1px 3px rgba(25,28,29,0.07);
  }
  .controls select:focus { box-shadow: 0 0 0 2px rgba(29,158,117,0.25), 0 1px 3px rgba(25,28,29,0.07); }

  /* Route cards */
  .route-list { display: flex; flex-direction: column; gap: 14px; }
  .route-card { background: var(--surface-low); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); transition: box-shadow 0.2s; }
  .route-card:hover { box-shadow: var(--shadow-lg); }
  .route-header { padding: 1.25rem 1.4rem; cursor: pointer; display: flex; align-items: flex-start; gap: 14px; }
  .route-header:hover { background: rgba(25,28,29,0.02); }

  .route-num { font-size: 11px; font-weight: 600; color: var(--muted); background: var(--gray-bg); border-radius: 5px; padding: 3px 7px; flex-shrink: 0; margin-top: 1px; }
  .mark-all-btn {
    font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 99px; cursor: pointer;
    border: none; color: var(--green-dark); background: var(--green-bg);
    transition: all 0.15s; white-space: nowrap;
  }
  .mark-all-btn:hover { background: var(--green); color: #fff; }
  .mark-all-btn--undo { color: var(--muted); background: var(--gray-bg); }
  .mark-all-btn--undo:hover { background: var(--muted); color: #fff; }
  .route-num.national      { background: var(--green-bg);  color: var(--green-dark); }
  .route-num.cycle         { background: var(--cycle-bg);  color: var(--cycle-dark); }
  .route-num.cycle.national{ background: var(--cycle-bg);  color: var(--cycle-dark); }
  .badge-cycle  { background: var(--cycle-bg);  color: var(--cycle-dark); }

  .route-meta { flex: 1; min-width: 0; }
  .route-name { font-size: 20px; font-weight: 700; font-family: 'Manrope', sans-serif; letter-spacing: -0.02em; line-height: 1.2; }
  .route-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  /* Editorial stat columns (reference: Stitch mockup) */
  .route-stats-row { display: flex; gap: 18px; margin-top: 10px; }
  .route-stat-col { display: flex; flex-direction: column; gap: 2px; }
  .route-stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
  .route-stat-val { font-size: 17px; font-weight: 800; font-family: 'Manrope', sans-serif; color: var(--text); line-height: 1; letter-spacing: -0.02em; }

  .badge { font-size: 12px; padding: 3px 8px; border-radius: 99px; font-weight: 400; white-space: nowrap; }
  .badge-green  { background: var(--green-bg);  color: var(--green-dark); }
  .badge-blue   { background: var(--blue-bg);   color: var(--blue); }
  .badge-amber  { background: var(--amber-bg);  color: var(--amber); }
  .badge-gray   { background: var(--gray-bg);   color: var(--gray); }
  .badge-red    { background: var(--red-bg);    color: var(--red); }

  .route-progress { margin-top: 10px; }
  .route-prog-bar { background: var(--sec-container); border-radius: 99px; height: 4px; overflow: visible; position: relative; }
  .route-prog-fill { height: 100%; background: linear-gradient(90deg, var(--primary-lt), var(--green)); border-radius: 99px; transition: width 0.3s; position: relative; }
  .route-prog-fill::after { content: ''; position: absolute; right: -2px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; background: var(--tertiary); border-radius: 50%; border: 1.5px solid var(--surface); }
  .route-prog-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-top: 4px; letter-spacing: 0.02em; }

  .route-chevron { color: var(--muted); font-size: 14px; margin-top: 4px; flex-shrink: 0; transition: transform 0.2s; }
  .route-card.open .route-chevron { transform: rotate(180deg); }

  /* Stages */
  .stages { border-top: 1px solid var(--ghost); }
  .stage-row { display: flex; align-items: center; gap: 10px; padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--ghost); transition: background 0.1s; }
  .stage-row:last-child { border-bottom: none; }
  .stage-row:hover { background: rgba(25,28,29,0.025); }

  /* ── Stage Timeline ───────────────────────────────────── */
  .stage-timeline { padding: 1rem 1.25rem 0.75rem 1.4rem; }
  .tl-item { position: relative; padding: 0 0 1.1rem 2.1rem; }
  .tl-item:last-child { padding-bottom: 0; }
  .tl-item:not(:last-child)::before {
    content: ''; position: absolute; left: 8px; top: 21px; bottom: 0;
    width: 2px; background: var(--ghost);
  }
  .tl-dot {
    position: absolute; left: 0; top: 1px;
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800; z-index: 1; transition: all 0.15s; cursor: pointer;
  }
  .tl-dot--done  { background: var(--primary); color: #fff; }
  .tl-dot--done:hover { background: var(--secondary); }
  .tl-dot--next  { background: var(--surface); border: 2.5px solid var(--primary); cursor: default; }
  .tl-dot--todo  { background: var(--surface); border: 2px solid var(--border); }
  .tl-dot--todo:hover  { border-color: var(--primary); }
  .tl-dot--future { background: var(--surface-low); border: 2px solid var(--ghost); cursor: default; }
  .tl-dot-pulse {
    width: 7px; height: 7px; border-radius: 50%; background: var(--tertiary);
    animation: tl-pulse 1.8s ease-in-out infinite;
  }
  @keyframes tl-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.35; transform: scale(0.65); }
  }
  .tl-item--future > .tl-body { opacity: 0.38; pointer-events: none; }
  .tl-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 0.875rem 1rem; box-shadow: var(--shadow);
    border: 1px solid var(--ghost);
  }
  .tl-next-eyebrow {
    font-size: 9px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--tertiary); margin-bottom: 4px; font-family: 'Manrope', sans-serif;
  }
  .tl-done-btn {
    margin-top: 0.75rem; padding: 6px 16px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.02em;
    background: var(--primary); color: #fff;
    border: none; border-radius: 99px; cursor: pointer;
    font-family: 'Manrope', sans-serif; transition: background 0.15s;
  }
  .tl-done-btn:hover { background: var(--primary-lt); }

  /* Transport mini (SBB dot-line) */
  .transport-mini { margin-top: 0.6rem; padding-top: 0.6rem; border-top: 1px solid var(--ghost); }
  .transport-mini-label {
    font-size: 9px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 5px; font-family: 'Manrope', sans-serif;
  }
  .transport-stop { position: relative; padding-left: 15px; padding-bottom: 7px; font-size: 12px; }
  .transport-stop:last-child { padding-bottom: 0; }
  .transport-stop::before {
    content: ''; position: absolute; left: 1px; top: 5px;
    width: 8px; height: 8px; border-radius: 50%;
  }
  .transport-stop--start::before { background: var(--secondary); }
  .transport-stop--end::before   { background: var(--tertiary); opacity: 0.65; }
  .transport-stop--start::after  {
    content: ''; position: absolute; left: 4px; top: 13px; bottom: 0; width: 2px; background: var(--ghost);
  }
  .transport-stop-name { font-weight: 600; color: var(--text); }
  .transport-stop-time { font-size: 11px; color: var(--muted); margin-left: 5px; }

  .stage-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: var(--surface); }
  .stage-check:hover { border-color: var(--green); }
  .stage-check.done { background: var(--green); border-color: var(--green); }
  .stage-check.done::after { content: ''; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: block; }

<script>
// ---------------------------------------------------------------------------
// Supabase
// ---------------------------------------------------------------------------
const SUPABASE_URL = 'https://mpgkkmkvzgqkvtoearxp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4r3CSFeo9Pu6C3Q6qSs64Q_R2yqy6CN';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let allRoutes       = [];
let completed       = {};   // key: "land_routeId_stageNr" → date string
let ratings         = {};   // key: "land_routeId_stageNr" → 1–5
let notes           = {};   // key: "land_routeId_stageNr" → string
let wishlist        = {};   // key: "land_routeId_stageNr" → true
let expanded        = {};   // key: "land_routeId" → bool
let filter          = 'all';
let landFilter      = 'hike';
let viewMode        = 'routes';
let visible         = 20;
let selectedStation = 'Basel SBB';
let surpriseStage   = null;

// ---------------------------------------------------------------------------
// Persistence (Supabase)
// ---------------------------------------------------------------------------
function formatDateCH(isoDate) {
  // Convert "2026-04-06" to "06.04.2026"
  if (!isoDate) return '';
  const [y, m, d] = isoDate.split('-');
  return `${d}.${m}.${y}`;
}

function toISODate(chDate) {
  // Convert "06.04.2026" to "2026-04-06"
  if (!chDate) return null;
  const [d, m, y] = chDate.split('.');
  return `${y}-${m}-${d}`;
}

async function loadUserState() {
  const { data: rows } = await sb.from('user_state')
    .select('stage_key, completed_on, rating, note');
  completed = {};
  ratings   = {};
  notes     = {};
  wishlist  = {};
  for (const row of (rows || [])) {
    if (row.completed_on) completed[row.stage_key] = formatDateCH(row.completed_on);
    if (row.rating)       ratings[row.stage_key]   = row.rating;
    if (row.note)         notes[row.stage_key]      = row.note;
    if (row.wishlist)     wishlist[row.stage_key]   = true;
  }
  const { data: prefs } = await sb.from('user_preferences')
    .select('selected_station').maybeSingle();
  if (prefs?.selected_station) {
    selectedStation = prefs.selected_station;
  }
}

function saveState() {
  // No-op: persistence is handled by persistStage() at mutation sites
}

async function persistStage(key) {
  if (!currentUser) return;
  await sb.from('user_state').upsert({
    user_id:      currentUser.id,
    stage_key:    key,
    completed_on: toISODate(completed[key]) || null,
    rating:       ratings[key] || null,
    note:         notes[key]   || null,
    wishlist:     wishlist[key] || null,
    updated_at:   new Date().toISOString()
  }, { onConflict: 'user_id,stage_key' });
}

async function persistStation(val) {
  if (!currentUser) return;
  await sb.from('user_preferences').upsert(
    { user_id: currentUser.id, selected_station: val, updated_at: new Date().toISOString() },
    { onConflict: 'user_id' }
  );
}

let noteTimer = null;
function saveNote(key, val) {
  clearTimeout(noteTimer);
  noteTimer = setTimeout(() => {
    if (val.trim()) notes[key] = val.trim();
    else delete notes[key];
    persistStage(key);
  }, 500);
}

// ---------------------------------------------------------------------------
// Data loading
// ---------------------------------------------------------------------------
async function loadData() {
  const MAX_RETRIES = 4;
  const RETRY_DELAY_MS = 3000;

  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    try {
      if (attempt > 1) {
        document.getElementById('subtitle').textContent = `Connecting… (attempt ${attempt}/${MAX_RETRIES})`;
        await new Promise(r => setTimeout(r, RETRY_DELAY_MS));
      }

      // Fetch routes (well under 1000)
      const { data: routes, error: routesErr } = await sb.from('routes').select('*').limit(1000);
      if (routesErr) throw new Error(routesErr.message);

      // Fetch stages in pages of 1000 (Supabase hard cap per request)
      let stages = [], from = 0;
      while (true) {
        const { data: page, error: stagesErr } = await sb.from('stages').select('*').range(from, from + 999);
        if (stagesErr) throw new Error(stagesErr.message);
        stages = stages.concat(page);
        if (page.length < 1000) break;
        from += 1000;
      }

      // Empty result on first attempt likely means DB is waking up — retry
      if (!routes.length && attempt < MAX_RETRIES) continue;

      allRoutes = routes.map(r => ({
        route_id:    r.id,
        land:        r.land,
        route_type:  r.route_type,
        name:        r.name,
        description: r.description || '',
        start:       r.start_name || '',
        end:         r.end_name || '',
        total_km:    r.total_km,
        stages: stages
          .filter(s => s.route_id === r.id && s.land === r.land)
          .sort((a, b) => a.stage_nr - b.stage_nr),
      }));

      document.getElementById('error-area').innerHTML = '';
      updateSubtitle();
      document.getElementById('stats').style.display = 'grid';
      populateCantons();
      populateStations();
      updateStats();
      render();
      return;
    } catch(e) {
      if (attempt === MAX_RETRIES) showError(e.message);
    }
  }
}

function showError(msg) {
  document.getElementById('error-area').innerHTML = `
    <div class="error-box">
      <strong>Could not load route data</strong><br>
      ${msg}<br><br>
      <a href="#" onclick="loadData();return false;">Try again</a>
      &nbsp;·&nbsp;
      <a href="#" onclick="hardReset();return false;">Sign out &amp; reset</a>
    </div>`;
  document.getElementById('subtitle').textContent = 'Could not load data';
}

function hardReset() {
  localStorage.clear();
  sessionStorage.clear();
  window.location.href = window.location.pathname;
}

// ---------------------------------------------------------------------------
// Stats
// ---------------------------------------------------------------------------
function stageKey(land, routeId, stageNr) { return `${land}_${routeId}_${stageNr}`; }
function routeKey(land, routeId)          { return `${land}_${routeId}`; }

function smUrl(route, stageNr) {
  const activity = route.land === 'cycle' ? 'cycling-in-switzerland' : 'hiking-in-switzerland';
  const id = String(route.route_id).padStart(2, '0');
  const single = route.stages.length === 1;
  return single
    ? `https://schweizmobil.ch/en/${activity}/route-${id}`
    : `https://schweizmobil.ch/en/${activity}/route-${id}/stage-${stageNr}`;
}

function updateSbbSlider() {
  const val = parseInt(document.getElementById('sbb-slider').value);
  document.getElementById('sbb-slider-val').textContent = val >= 240 ? 'any' : fmtMins(val);
  visible = 20;
  render();
}

function toggleSettings() {
  const panel   = document.getElementById('settings-panel');
  const overlay = document.getElementById('settings-overlay');
  const btn     = document.getElementById('settings-btn');
  const isOpen  = panel.classList.toggle('open');
  overlay.classList.toggle('open', isOpen);
  btn.classList.toggle('active', isOpen);
  document.body.style.overflow = isOpen ? 'hidden' : '';
}

function getSbbMax() {
  return parseInt(document.getElementById('sbb-slider')?.value ?? 240);
}

function stageBestSbb(stage) {
  const times = (stage.sbb_times || {})[selectedStation] || {};
  const startIsBasel = (stage.start_name || '').toLowerCase().startsWith('basel');
  const endIsBasel   = (stage.end_name   || '').toLowerCase().startsWith('basel');
  const vals = [
    startIsBasel ? 0 : times.start,
    endIsBasel   ? 0 : times.end,
  ].filter(n => n != null && n >= 0);
  return vals.length ? Math.min(...vals) : null;
}

function stageWithinSbb(stage, max) {
  if (max >= 240) return true;
  const best = stageBestSbb(stage);
  return best !== null && best <= max;
}

function populateCantons() {
  const all = [...new Set(allRoutes.flatMap(r => r.stages.flatMap(s => s.cantons || [])))].sort();
  const sel = document.getElementById('canton-filter');
  all.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
}

// Friendly labels for difficulty values
// Maps any raw API difficulty string → canonical value (lowercase, trimmed)
const DIFF_CANON = {
  // Hiking — Italian variants and capitalisation quirks
  'sentiero di montagna':            'mountain hiking trail',
  'mountain trail':                  'mountain hiking trail',
  // Cycling
  'easy':     'easy',
  'medium':   'medium',
  'difficult':'difficult',
};
function normalizeDiff(d) {
  if (!d) return null;
  const s = d.trim().toLowerCase();
  return DIFF_CANON[s] ?? s;
}

// Valid canonical difficulties per land — anything else is discarded
const VALID_DIFFS = {
  hike:  new Set(['hiking trail', 'mountain hiking trail', 'demanding mountain hiking trail', 'alpine hiking trail', 'demanding alpine hiking trail']),
  cycle: new Set(['easy', 'medium', 'difficult']),
};
function canonDiff(d, land) {
  const n = normalizeDiff(d);
  return (n && VALID_DIFFS[land]?.has(n)) ? n : null;
}

// Canonical value → display label
const DIFF_LABELS = {
  'hiking trail':                    'T1 · Hiking trail',
  'mountain hiking trail':           'T2 · Mountain hiking',
  'demanding mountain hiking trail': 'T3 · Demanding mountain',
  'alpine hiking trail':             'T4 · Alpine',
  'demanding alpine hiking trail':   'T5 · Demanding alpine',
  'easy':      'Easy',
  'medium':    'Medium',
  'difficult': 'Difficult',
};


function populateStations() {
  const stations = [...new Set(
    allRoutes.flatMap(r => r.stages.flatMap(s => Object.keys(s.sbb_times || {})))
  )].sort();
  const container = document.getElementById('station-pills');
  container.innerHTML = '';
  if (!stations.length) return;
  // Fall back to first available if saved station isn't in data yet
  if (!stations.includes(selectedStation)) {
    selectedStation = stations[0];
    persistStation(selectedStation);
  }
  stations.forEach(st => {
    const btn = document.createElement('button');
    btn.className = 'settings-pill' + (st === selectedStation ? ' active' : '');
    btn.textContent = st;
    btn.onclick = () => setStation(st);
    container.appendChild(btn);
  });
}

function setStation(val) {
  selectedStation = val;
  persistStation(val);
  document.querySelectorAll('.settings-pill').forEach(el =>
    el.classList.toggle('active', el.textContent === val)
  );
  render();
}

function updateSubtitle() {
  const vis    = allRoutes.filter(r => r.land === landFilter);
  const stages = vis.reduce((s, r) => s + r.stages.length, 0);
  document.getElementById('subtitle').textContent = `${vis.length} routes · ${stages} stages`;
}

function updateStats() {
  const visRoutes   = allRoutes.filter(r => r.land === landFilter);
  const allFlat     = visRoutes.flatMap(r => r.stages.map(s => ({...s, _land: r.land, _routeId: r.route_id})));
  const totalStages = allFlat.length;
  const doneStages  = allFlat.filter(s => completed[stageKey(s._land, s._routeId, s.stage_nr)]);
  const doneKm      = doneStages.reduce((s, st) => s + (st.dist_km || 0), 0);
  const totalKm     = allFlat.reduce((s, st) => s + (st.dist_km || 0), 0);
  const pct = totalStages ? Math.round(doneStages.length / totalStages * 100) : 0;

  document.getElementById('stat-done').textContent = `${doneStages.length} / ${totalStages}`;
  document.getElementById('stat-done-sub').textContent = `${pct}% of stages`;
  document.getElementById('stat-km').textContent = Math.round(doneKm).toLocaleString();
  document.getElementById('stat-km-label').textContent = landFilter === 'cycle' ? 'km cycled' : 'km walked';
  document.getElementById('stat-remaining').textContent = Math.round(totalKm - doneKm).toLocaleString();
}

// ---------------------------------------------------------------------------
// Filtering + sorting
// ---------------------------------------------------------------------------

function setLand(l) {
  landFilter = l;
  visible = 20;
  document.body.setAttribute('data-land', l);
  ['hike','cycle'].forEach(x =>
    document.getElementById('land-btn-' + x).classList.toggle('active', x === l)
  );
  updateSubtitle();
  updateStats();
  render();
}

function setView(v) {
  viewMode = v;
  visible = 20;
  const isDash = v === 'dashboard';
  const isTracking = v === 'routes' || v === 'stages';

  // Top nav: Dashboard vs Tracking
  document.getElementById('view-dashboard').classList.toggle('active', isDash);
  document.getElementById('view-tracking').classList.toggle('active', isTracking);

  // Subview toggle: Routes vs All Stages
  const subviewToggle = document.getElementById('subview-toggle');
  if (subviewToggle) {
    document.getElementById('subview-routes').classList.toggle('active', v === 'routes');
    document.getElementById('subview-stages').classList.toggle('active', v === 'stages');
  }

  document.getElementById('sort').style.display       = v === 'routes' ? '' : 'none';
  document.getElementById('stage-sort').style.display = v === 'stages' ? '' : 'none';
  const hideContent = isDash;
  document.getElementById('tabs').style.display              = hideContent ? 'none' : '';
  document.querySelector('.controls').style.display          = hideContent ? 'none' : '';
  document.getElementById('surprise-wrap-row').style.display = hideContent ? 'none' : 'flex';
  render();
}

function goToRoute(rkey) {
  expanded[rkey] = true;
  filter = 'all';
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === 0));
  setView('routes');   // sets visible=20 and renders
  visible = 999;       // expand to show all routes
  render();            // re-render with all routes visible
  setTimeout(() => {
    const el = document.getElementById('route-' + rkey);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function setFilter(f) {
  filter = f;
  visible = 20;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function filteredRoutes() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cantonFilter = document.getElementById('canton-filter').value;
  const sbbMax       = getSbbMax();
  const sortBy = document.getElementById('sort').value;

  let routes = allRoutes.filter(r => {
    r.stages.forEach(s => { s._routeId = r.route_id; s._land = r.land; });

    if (r.land !== landFilter) return false;
    if (filter === 'national') return r.route_type === 'national';
    if (filter === 'regional') return r.route_type === 'regional';
    if (filter === 'local')    return r.route_type === 'local';
    if (filter === 'nextup') {
      const hasDone = r.stages.some(s => completed[stageKey(r.land, r.route_id, s.stage_nr)]);
      const hasTodo = r.stages.some(s => !completed[stageKey(r.land, r.route_id, s.stage_nr)]);
      return hasDone && hasTodo;
    }
    if (filter === 'done') {
      return r.stages.some(s => completed[stageKey(r.land, r.route_id, s.stage_nr)]);
    }
    if (filter === 'todo') {
      return r.stages.some(s => !completed[stageKey(r.land, r.route_id, s.stage_nr)]);
    }
    if (filter === 'wishlist') {
      return r.stages.some(s => wishlist[stageKey(r.land, r.route_id, s.stage_nr)]);
    }
    return true;
  }).filter(r => {
    if (!cantonFilter) return true;
    return r.stages.some(s => (s.cantons || []).includes(cantonFilter));
  }).filter(r => {
    if (sbbMax >= 240) return true;
    return r.stages.some(s => stageWithinSbb(s, sbbMax));
  }).filter(r => {
    if (!q) return true;
    return r.name.toLowerCase().includes(q)
      || r.stages.some(s =>
          (s.start_name||'').toLowerCase().includes(q) ||
          (s.end_name||'').toLowerCase().includes(q));
  });

  if (sortBy === 'dist') {
    routes.sort((a, b) => {
      const aTot = a.stages.reduce((s,st) => s + (st.dist_km||0), 0);
      const bTot = b.stages.reduce((s,st) => s + (st.dist_km||0), 0);
      return aTot - bTot;
    });
  } else if (sortBy === 'sbb') {
    routes.sort((a, b) => {
      const minSbb = r => {
        const vals = r.stages.map(s => stageBestSbb(s)).filter(n => n != null);
        return vals.length ? Math.min(...vals) : Infinity;
      };
      return minSbb(a) - minSbb(b);
    });
  } else if (sortBy === 'alpha') {
    routes.sort((a, b) => a.name.localeCompare(b.name));
  } else {
    routes.sort((a, b) => a.route_id - b.route_id);
  }

  return routes;
}

function filteredStages() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cantonFilter = document.getElementById('canton-filter').value;
  const sbbMax       = getSbbMax();
  const sortBy = document.getElementById('stage-sort').value;

  let stages = allRoutes.flatMap(r =>
    r.stages.map(s => ({ ...s, _route: r, _routeId: r.route_id, _land: r.land }))
  );

  // Pre-compute next-up stage keys for in-progress routes
  const nextUpKeys = new Set();
  allRoutes.filter(r => r.land === landFilter).forEach(r => {
    const sorted = [...r.stages].sort((a, b) => a.stage_nr - b.stage_nr);
    if (!sorted.some(s => completed[stageKey(r.land, r.route_id, s.stage_nr)])) return;
    const next = sorted.find(s => !completed[stageKey(r.land, r.route_id, s.stage_nr)]);
    if (next) nextUpKeys.add(stageKey(r.land, r.route_id, next.stage_nr));
  });

  stages = stages.filter(s => {
    if (s._land !== landFilter) return false;
    const rt = s._route.route_type;
    if (filter === 'national') return rt === 'national';
    if (filter === 'regional') return rt === 'regional';
    if (filter === 'local')    return rt === 'local';
    if (filter === 'nextup')   return nextUpKeys.has(stageKey(s._land, s._routeId, s.stage_nr));
    if (filter === 'done')     return !!completed[stageKey(s._land, s._routeId, s.stage_nr)];
    if (filter === 'todo')     return !completed[stageKey(s._land, s._routeId, s.stage_nr)];
    if (filter === 'wishlist') return !!wishlist[stageKey(s._land, s._routeId, s.stage_nr)];
    return true;
  });

  if (cantonFilter) stages = stages.filter(s => (s.cantons || []).includes(cantonFilter));
  if (sbbMax < 240) stages = stages.filter(s => stageWithinSbb(s, sbbMax));

  if (q) stages = stages.filter(s =>
    s._route.name.toLowerCase().includes(q) ||
    (s.start_name || '').toLowerCase().includes(q) ||
    (s.end_name   || '').toLowerCase().includes(q)
  );

  const bestSbb = s => stageBestSbb(s) ?? Infinity;

  if      (sortBy === 'sbb_asc')   stages.sort((a, b) => bestSbb(a) - bestSbb(b));
  else if (sortBy === 'sbb_desc')  stages.sort((a, b) => bestSbb(b) - bestSbb(a));
  else if (sortBy === 'dist_asc')  stages.sort((a, b) => (a.dist_km || 0) - (b.dist_km || 0));
  else if (sortBy === 'dist_desc') stages.sort((a, b) => (b.dist_km || 0) - (a.dist_km || 0));
  else if (sortBy === 'elev_desc') stages.sort((a, b) => (b.elev_up || 0) - (a.elev_up || 0));
  else if (sortBy === 'time_asc')  stages.sort((a, b) => (a.hiking_hrs || 99) - (b.hiking_hrs || 99));

  return stages;
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------
function diffClass(d, land) {
  const s = canonDiff(d, land);
  if (!s) return null;
  if (land === 'cycle') {
    if (s === 'easy')      return 'diff-easy';
    if (s === 'medium')    return 'diff-medium';
    if (s === 'difficult') return 'diff-difficult';
  }
  if (s === 'hiking trail')                    return 'diff-t1';
  if (s === 'mountain hiking trail')           return 'diff-t2';
  if (s === 'demanding mountain hiking trail') return 'diff-t3';
  if (s === 'alpine hiking trail')             return 'diff-t4';
  if (s === 'demanding alpine hiking trail')   return 'diff-t5';
  return null;
}

// ---------------------------------------------------------------------------
// Season warnings
// ---------------------------------------------------------------------------
const ALPINE_CANTONS = new Set(['VS', 'GR', 'UR', 'GL', 'OW', 'NW', 'TI', 'BE']);
const NOW_MONTH = new Date().getMonth() + 1; // 1–12

function seasonInfo(stage, land) {
  if (land !== 'hike') return null;
  const diff = canonDiff(stage.difficulty, 'hike');
  const inAlpine = (stage.cantons || []).some(c => ALPINE_CANTONS.has(c));
  if (diff === 'demanding alpine hiking trail' || diff === 'alpine hiking trail') {
    const warn = NOW_MONTH < 7 || NOW_MONTH > 9;
    return { label: 'Jul – Sep', warn };
  }
  if (diff === 'demanding mountain hiking trail') {
    const warn = NOW_MONTH < 6 || NOW_MONTH > 10;
    return { label: 'Jun – Oct', warn };
  }
  if (inAlpine && diff === 'mountain hiking trail') {
    const warn = NOW_MONTH < 5 || NOW_MONTH > 10;
    return { label: 'May – Oct', warn };
  }
  return null;
}

function surpriseMe() {
  const sbbMax = getSbbMax();
  const pool = allRoutes
    .filter(r => r.land === landFilter)
    .flatMap(r => {
      const sorted = [...r.stages].sort((a, b) => a.stage_nr - b.stage_nr);
      const isSingle = r.stages.length === 1;
      const hasDone  = sorted.some(s => completed[stageKey(r.land, r.route_id, s.stage_nr)]);
      const nextUp   = hasDone ? sorted.find(s => !completed[stageKey(r.land, r.route_id, s.stage_nr)]) : null;
      // Include: single-stage routes (not yet done), or next-up from in-progress routes
      const candidates = [];
      if (isSingle && !completed[stageKey(r.land, r.route_id, sorted[0].stage_nr)]) {
        candidates.push(sorted[0]);
      } else if (nextUp) {
        candidates.push(nextUp);
      }
      return candidates.map(s => ({ ...s, _route: r, _routeId: r.route_id, _land: r.land }));
    })
    .filter(s => !completed[stageKey(s._land, s._routeId, s.stage_nr)])
    .filter(s => sbbMax >= 240 || stageWithinSbb(s, sbbMax));
  if (!pool.length) return;
  surpriseStage = pool[Math.floor(Math.random() * pool.length)];
  render();
  document.getElementById('surprise-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderSurprise() {
  if (!surpriseStage) return '';
  const s = surpriseStage;
  const r = s._route;
  const key = stageKey(s._land, s._routeId, s.stage_nr);
  const sbbTimes = (s.sbb_times || {})[selectedStation] || {};
  const best = stageBestSbb(s);
  const sbbStr = best != null ? `🚆 ${fmtMins(best)} from ${selectedStation}` : '';
  const distStr = fmtKm(s.dist_km);
  const hrsStr  = s.duration_hrs ? fmtHrs(s.duration_hrs) : null;
  const season  = seasonInfo(s, s._land);
  const diff    = canonDiff(s.difficulty, s._land);
  const smLink  = smUrl(r, s.stage_nr);
  const done    = !!completed[key];
  return `<div class="surprise-card" id="surprise-anchor">
    <div class="surprise-header">
      <span style="font-size:22px">🎲</span>
      <div>
        <div class="surprise-label">Suggested for you</div>
        <div class="surprise-route">${r.land === 'cycle' ? '🚴' : '🥾'} ${r.name}</div>
      </div>
      <button class="surprise-btn" style="margin-left:auto" onclick="surpriseStage=null;render()">✕</button>
    </div>
    <div class="surprise-title ${done ? 'done-text' : ''}">${done ? '✓ ' : ''}${r.stages.length > 1 ? `Stage ${s.stage_nr}: ` : ''}${sbbTimes.start === null ? '🛏 ' : ''}${s.start_name || '?'} → ${s.end_name || '?'}${sbbTimes.end === null ? ' 🛏' : ''}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:0.5rem">
      ${distStr ? `<span class="badge badge-gray">${distStr}</span>` : ''}
      ${s.elev_up ? `<span class="badge badge-gray">↑ ${s.elev_up.toLocaleString()} m</span>` : ''}
      ${hrsStr   ? `<span class="badge badge-gray">⏱ ${hrsStr}</span>` : ''}
      ${diff && diffClass(s.difficulty, s._land) ? `<span class="badge ${diffClass(s.difficulty, s._land)}">${DIFF_LABELS[diff]}</span>` : ''}
      ${season   ? `<span class="badge ${season.warn ? 'badge-season-warn' : 'badge-season'}">❄ ${season.label}</span>` : ''}
      ${elevProfile(s.elev_up, s.elev_down)}
    </div>
    ${sbbStr ? `<div style="font-size:13px;color:var(--muted)">${sbbStr}</div>` : ''}
    <div class="surprise-actions">
      <a href="${smLink}" target="_blank" rel="noopener" class="surprise-btn surprise-btn-primary">View on SchweizMobil ↗</a>
      <button class="surprise-btn" onclick="surpriseMe()">Try another</button>
      <button class="surprise-btn ${done ? 'surprise-btn-primary' : ''}" onclick="toggleStage('${key}')">${done ? '✓ Done — undo?' : 'Mark as done'}</button>
    </div>
  </div>`;
}

function elevProfile(elevUp, elevDown) {
  const up = elevUp || 0, dn = elevDown || 0;
  if (up < 30 && dn < 30) return '';

  const total = up + dn;
  let icon;
  if      (total < 300)  icon = 'icon-1-meadow.svg';
  else if (total < 600)  icon = 'icon-2-rolling-hills.svg';
  else if (total < 1200) icon = 'icon-3-foothills.svg';
  else if (total < 2000) icon = 'icon-4-alpine.svg';
  else                   icon = 'icon-5-summit.svg';

  const upStr = up >= 30 ? `<span style="font-size:11px;color:var(--green-dark);white-space:nowrap">↑ ${up.toLocaleString()} m</span>` : '';
  const dnStr = dn >= 30 ? `<span style="font-size:11px;color:var(--muted);white-space:nowrap">↓ ${dn.toLocaleString()} m</span>` : '';

  return `<div style="display:flex;align-items:center;gap:4px;flex-shrink:0" title="↑ ${up.toLocaleString()} m  ↓ ${dn.toLocaleString()} m">
    ${upStr}
    <img src="assets/${icon}" width="34" height="34" style="border-radius:5px;display:block">
    ${dnStr}
  </div>`;
}

function fmtMins(mins) {
  if (!mins) return null;
  const h = Math.floor(mins / 60), m = mins % 60;
  return h === 0 ? `${m} min` : m === 0 ? `${h}h` : `${h}h ${m}m`;
}

function fmtHrs(hrs) {
  const h = Math.floor(hrs), m = Math.round((hrs - h) * 60);
  if (m === 0) return `${h}hr`;
  if (h === 0) return `${m}min`;
  return `${h}hr ${m}min`;
}

function fmtKm(km) {
  if (!km) return null;
  return km >= 10 ? Math.round(km) + ' km' : km.toFixed(1) + ' km';
}

function renderStages(route) {
  if (!expanded[routeKey(route.land, route.route_id)]) return '';

  const stages   = [...route.stages].sort((a, b) => a.stage_nr - b.stage_nr);
  const anyDone  = stages.some(s => completed[stageKey(route.land, route.route_id, s.stage_nr)]);
  const nextNr   = stages.find(s => !completed[stageKey(route.land, route.route_id, s.stage_nr)])?.stage_nr ?? null;
  const multi    = stages.length > 1;

  const items = stages.map(stage => {
    stage._routeId = route.route_id; stage._land = route.land;
    const key     = stageKey(route.land, route.route_id, stage.stage_nr);
    const done    = !!completed[key];
    const isNext  = !done && anyDone && stage.stage_nr === nextNr;
    const isFuture= !done && anyDone && !isNext;

    const sbbTimes    = (stage.sbb_times || {})[selectedStation] || {};
    const startTravel = fmtMins(sbbTimes.start);
    const endTravel   = fmtMins(sbbTimes.end);
    const distStr     = fmtKm(stage.dist_km);
    const hrsStr      = stage.duration_hrs ? fmtHrs(stage.duration_hrs) : null;
    const aspStr      = stage.km_asphalt != null ? `${stage.km_asphalt} km asphalt` : null;
    const diff        = stage.difficulty;
    const wished      = !!wishlist[key];
    const smLink      = smUrl(route, stage.stage_nr);
    const season      = seasonInfo(stage, route.land);
    const viaStr      = stage.via ? ` via ${stage.via}` : '';
    const title       = `${multi ? `Stage ${stage.stage_nr}: ` : ''}${sbbTimes.start === null ? '🛏 ' : ''}${stage.start_name || '?'} → ${stage.end_name || '?'}${sbbTimes.end === null ? ' 🛏' : ''}${viaStr}`;

    // Dot
    const dot = done
      ? `<div class="tl-dot tl-dot--done" onclick="toggleStage('${key}')" title="Undo">✓</div>`
      : isNext
        ? `<div class="tl-dot tl-dot--next"><div class="tl-dot-pulse"></div></div>`
        : `<div class="tl-dot tl-dot--${isFuture ? 'future' : 'todo'}" onclick="toggleStage('${key}')" title="Mark done"></div>`;

    // Badges
    const badges = `<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:5px">
      ${distStr ? `<span class="badge badge-gray">${distStr}</span>` : ''}
      ${stage.elev_up ? `<span class="badge badge-gray">↑ ${stage.elev_up.toLocaleString()} m</span>` : ''}
      ${hrsStr   ? `<span class="badge badge-gray">⏱ ${hrsStr}</span>` : ''}
      ${aspStr   ? `<span class="badge badge-cycle">🛣 ${aspStr}</span>` : ''}
      ${diffClass(diff, route.land) ? `<span class="badge ${diffClass(diff, route.land)}">${DIFF_LABELS[canonDiff(diff, route.land)]}</span>` : ''}
      ${season   ? `<span class="badge ${season.warn ? 'badge-season-warn' : 'badge-season'}">❄ ${season.label}</span>` : ''}
      ${elevProfile(stage.elev_up, stage.elev_down)}
    </div>`;

    // SBB transport mini
    const transport = (startTravel || endTravel) ? `
      <div class="transport-mini">
        <div class="transport-mini-label">🚆 from ${selectedStation}</div>
        ${startTravel ? `<div class="transport-stop transport-stop--start">
          <span class="transport-stop-name">${stage.start_name || '?'}</span>
          <span class="transport-stop-time">${startTravel}</span>
        </div>` : ''}
        ${endTravel ? `<div class="transport-stop transport-stop--end">
          <span class="transport-stop-name">${stage.end_name || '?'}</span>
          <span class="transport-stop-time">${endTravel}</span>
        </div>` : ''}
      </div>` : '';

    // Stars
    const stars = done ? `<div class="stage-stars" id="stars-${key}" onmouseleave="starsLeave('${key}')">
      ${[1,2,3,4,5].map(n => {
        const f = (ratings[key]||0) >= n;
        return `<span class="star" style="color:${f?'#f5a623':'var(--border)'}"
          onmouseover="starsHover('${key}',${n})" onclick="setRating('${key}',${n});event.stopPropagation()">★</span>`;
      }).join('')}</div>` : '';

    const wish = `<div class="stage-wish${wished?' active':''}" onclick="toggleWishlist('${key}')">${wished?'♥':'♡'}</div>`;
    const sm   = `<a href="${smLink}" target="_blank" rel="noopener" class="sm-link" onclick="event.stopPropagation()">↗</a>`;

    // ── Done: compact row ──
    if (done) return `<div class="tl-item">
      ${dot}
      <div class="tl-body">
        <div style="display:flex;align-items:baseline;gap:6px">
          <span class="stage-title done-text" style="font-size:13px;flex:1">${title}</span>
          ${sm}${wish}
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap">
          <span class="stage-done-date" style="margin:0">✓ ${completed[key]}</span>
          ${stars}
        </div>
        <textarea class="stage-note" rows="1" placeholder="Add a note…"
          oninput="this.rows=Math.max(1,this.value.split('\\n').length);saveNote('${key}',this.value)"
          onfocus="this.rows=Math.max(2,this.value.split('\\n').length)"
          onblur="if(!this.value.trim())this.rows=1"
        >${notes[key] || ''}</textarea>
      </div>
    </div>`;

    // ── Next up: elevated card ──
    if (isNext) return `<div class="tl-item">
      ${dot}
      <div class="tl-card">
        <div class="tl-next-eyebrow">NEXT UP</div>
        <div style="display:flex;align-items:baseline;gap:6px">
          <span class="stage-title" style="font-size:14px;font-weight:700;flex:1">${title}</span>
          ${sm}${wish}
        </div>
        ${badges}
        ${transport}
        <button class="tl-done-btn" onclick="toggleStage('${key}')">✓ Mark as done</button>
      </div>
    </div>`;

    // ── Todo / Future ──
    return `<div class="tl-item${isFuture?' tl-item--future':''}">
      ${dot}
      <div class="tl-body">
        <div style="display:flex;align-items:baseline;gap:6px">
          <span class="stage-title" style="font-size:13px;flex:1">${title}</span>
          ${sm}${wish}
        </div>
        ${badges}
        ${transport}
      </div>
    </div>`;
  }).join('');

  return `<div class="stage-timeline">${items}</div>`;
}

function renderRoute(route) {
  route.stages.forEach(s => { s._routeId = route.route_id; s._land = route.land; });
  const totalStages = route.stages.length;
  const doneCount   = route.stages.filter(s => completed[stageKey(route.land, route.route_id, s.stage_nr)]).length;
  const totalKm     = route.stages.reduce((s, st) => s + (st.dist_km || 0), 0);
  const doneKm      = route.stages.filter(s => completed[stageKey(route.land, route.route_id, s.stage_nr)])
                                  .reduce((s, st) => s + (st.dist_km || 0), 0);
  const pct = totalStages ? Math.round(doneCount / totalStages * 100) : 0;
  const rkey  = routeKey(route.land, route.route_id);
  const isOpen = !!expanded[rkey];
  const isCycle = route.land === 'cycle';
  const numClass = [isCycle ? 'cycle' : '', route.route_type === 'national' ? 'national' : ''].filter(Boolean).join(' ');
  const routeCantons = [...new Set(route.stages.flatMap(s => s.cantons || []))];
  const icon = isCycle ? '🚴' : '🥾';

  return `<div class="route-card ${isOpen ? 'open' : ''}" id="route-${rkey}">
    <div class="route-header" onclick="toggleRoute('${rkey}')">
      <span class="route-num ${numClass}">${route.route_type === 'national' ? '★ ' : ''}${route.route_id}</span>
      <div class="route-meta">
        <div class="route-name">${icon} ${route.name || 'Route ' + route.route_id}</div>
        <div class="route-stats-row">
          <div class="route-stat-col"><span class="route-stat-label">Stages</span><span class="route-stat-val">${totalStages}</span></div>
          <div class="route-stat-col"><span class="route-stat-label">Total km</span><span class="route-stat-val">${Math.round(totalKm)}</span></div>
          ${doneCount > 0 ? `<div class="route-stat-col"><span class="route-stat-label">Done</span><span class="route-stat-val" style="color:var(--green)">${doneCount}/${totalStages}</span></div>` : ''}
        </div>
        ${routeCantons.length ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px">
          ${routeCantons.map(c => `<span class="canton-badge"><span class="canton-code">${c}</span><img src="https://schweizmobil.ch/img/footer/${c.toLowerCase()}.svg" alt="${c}" width="16" height="16" onerror="this.style.display='none'"></span>`).join('')}
        </div>` : ''}
        ${doneCount > 0 ? `
        <div class="route-progress">
          <div class="route-prog-bar"><div class="route-prog-fill" style="width:${pct}%"></div></div>
          <div class="route-prog-label"><span style="color:var(--primary);font-family:'Manrope',sans-serif">${pct}%</span> · ${Math.round(doneKm)} / ${Math.round(totalKm)} km</div>
        </div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <span class="route-chevron">▾</span>
        ${doneCount < totalStages ? `<button class="mark-all-btn" onclick="markRouteComplete('${rkey}');event.stopPropagation()" title="Mark all stages complete">✓ All</button>` : `<button class="mark-all-btn mark-all-btn--undo" onclick="markRouteComplete('${rkey}',true);event.stopPropagation()" title="Unmark all stages">✕ All</button>`}
        ${(() => { const allWished = route.stages.every(s => wishlist[stageKey(route.land, route.route_id, s.stage_nr)]); return `<button class="wish-route-btn${allWished ? ' active' : ''}" onclick="wishlistRoute('${rkey}',${allWished});event.stopPropagation()" title="${allWished ? 'Remove route from wishlist' : 'Add all stages to wishlist'}">${allWished ? '♥' : '♡'} Wishlist</button>`; })()}
      </div>
    </div>
    ${renderStages(route)}
  </div>`;
}

         title="${done ? 'Mark as incomplete' : 'Mark as done'}"></div>
    <div class="stage-info">
      <div style="font-size:11px;color:var(--muted);margin-bottom:2px">
        <span class="route-num ${numClass}" style="font-size:10px;padding:2px 5px">${numLabel}</span>
        ${isCycle ? '🚴' : '🥾'} ${r.name}
      </div>
      <div class="stage-title ${done ? 'done-text' : ''}">${r.stages.length > 1 ? `Stage ${stage.stage_nr}: ` : ''}${sbbTimes.start === null ? '🛏 ' : ''}${stage.start_name || '?'} → ${stage.end_name || '?'}${sbbTimes.end === null ? ' 🛏' : ''}${viaStr}
        <a href="${smLink}" target="_blank" rel="noopener" class="sm-link" title="View on SchweizMobil" onclick="event.stopPropagation()">↗</a>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;align-items:center">
        ${distStr ? `<span class="badge badge-gray">${distStr}</span>` : ''}
        ${stage.elev_up ? `<span class="badge badge-gray">↑ ${stage.elev_up.toLocaleString()} m</span>` : ''}
        ${hrsStr ? `<span class="badge badge-gray">⏱ ${hrsStr}</span>` : ''}
        ${aspStr ? `<span class="badge badge-cycle">🛣 ${aspStr}</span>` : ''}
        ${diffClass(stage.difficulty, r.land) ? `<span class="badge ${diffClass(stage.difficulty, r.land)}">${DIFF_LABELS[canonDiff(stage.difficulty, r.land)]}</span>` : ''}
        ${(() => { const s = seasonInfo(stage, r.land); return s ? `<span class="badge ${s.warn ? 'badge-season-warn' : 'badge-season'}">❄ ${s.label}</span>` : ''; })()}
        ${(stage.cantons||[]).map(c => `<span class="canton-badge"><span class="canton-code">${c}</span><img src="https://schweizmobil.ch/img/footer/${c.toLowerCase()}.svg" alt="${c}" width="14" height="14" onerror="this.style.display='none'"></span>`).join('')}
      </div>
      ${startTravel || endTravel ? `
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:var(--muted)">
        ${startTravel ? `<span>🚆 <strong>${stage.start_name}</strong> ${startTravel} from ${selectedStation}</span>` : ''}
        ${endTravel   ? `<span>🚆 <strong>${stage.end_name}</strong> ${endTravel} from ${selectedStation}</span>` : ''}
      </div>` : ''}
      ${done ? `<div class="stage-done-date">✓ Completed ${completed[key]}</div>
      <textarea class="stage-note" rows="1" placeholder="Add a note…"
        oninput="this.rows=Math.max(1,this.value.split('\\n').length);saveNote('${key}',this.value)"
        onfocus="this.rows=Math.max(2,this.value.split('\\n').length)"
        onblur="if(!this.value.trim())this.rows=1"
      >${notes[key] || ''}</textarea>` : ''}
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;align-self:center">
      ${elevProfile(stage.elev_up, stage.elev_down)}
      ${starsHtml}
      <div class="stage-wish${wished ? ' active' : ''}" onclick="toggleWishlist('${key}')" title="${wished ? 'Remove from wishlist' : 'Add to wishlist'}">${wished ? '♥' : '♡'}</div>
    </div>
  </div>`;
}

function relativeDate(chDate) {
  if (!chDate) return '';
  const [d, m, y] = chDate.split('.');
  const diff = Math.round((Date.now() - new Date(`${y}-${m}-${d}`)) / 86400000);
  if (diff <= 0) return 'TODAY';
  if (diff === 1) return '1D AGO';
  if (diff < 7)  return `${diff}D AGO`;
  if (diff < 30) return `${Math.round(diff/7)}W AGO`;
  if (diff < 365) return `${Math.round(diff/30)}MO AGO`;
  return `${Math.round(diff/365)}Y AGO`;
}

function renderDashboard() {
  const allFlat = allRoutes
    .filter(r => r.land === landFilter)
    .flatMap(r => r.stages.map(s => ({ ...s, _route: r, _land: r.land, _routeId: r.route_id })));
  const doneFlat = allFlat.filter(s => completed[stageKey(s._land, s._routeId, s.stage_nr)]);
  const doneKm     = Math.round(doneFlat.reduce((n, s) => n + (s.dist_km || 0), 0));
  const doneElev   = Math.round(doneFlat.reduce((n, s) => n + (s.elev_up   || 0), 0));
  const doneDescent= Math.round(doneFlat.reduce((n, s) => n + (s.elev_down || 0), 0));
  const doneCount  = doneFlat.length;

  // All routes enriched
  const routesEnriched = allRoutes.map(r => {
    const doneSt = r.stages.filter(s => completed[stageKey(r.land, r.route_id, s.stage_nr)]).length;
    const total  = r.stages.length;
    const km     = Math.round(r.stages.reduce((n, s) => n + (s.dist_km || 0), 0));
    const elev   = r.stages.reduce((n, s) => n + (s.elev_up || 0), 0);
    const next   = r.stages.find(s => !completed[stageKey(r.land, r.route_id, s.stage_nr)]);
    const pct    = total ? Math.round(doneSt / total * 100) : 0;
    return { ...r, _done: doneSt, _total: total, _pct: pct, _km: km, _elev: elev, _next: next };
  });

  // In-progress routes for current land
  const inProgress = routesEnriched
    .filter(r => r.land === landFilter && r._done > 0 && r._done < r._total)
    .sort((a, b) => b._pct - a._pct);

  const heroRoute  = inProgress[0] || null;
  const gridRoutes = inProgress.slice(0, 4);

  // ── Hero ──
  const heroHtml = heroRoute ? `
    <div class="dash-hero">
      <img class="dash-hero-bg" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBE_Az3YmLRSe9g6TQdoT04O8ach6Lg5tNWi3qF77OkHE0XCCunKg4bp_2GreuRp91wSBAqgojyAdoYrelyulCX4MpGakVjvgJe4G14USJ7wKMPQz1biGJIdFm2VySzLhpsTwipKfHzHTC44JXRxdmpnNU-ei4hiAm2wLnEBEfmKGPqN5mqIFLA-AtGQgQlxBOr8ZOKpx7pJXtRW3BhH2TwkRMwFDEoO4L_ZzanH4Eor_8UeLTuWR4g20Svi0aGNSKhVfvWgVD-ObUC" alt="">
      <div class="dash-hero-inner">
        <div class="dash-hero-eyebrow">Current Expedition</div>
        <h2>${heroRoute.name}</h2>
        <div class="dash-hero-sub">${heroRoute.start} → ${heroRoute.end}</div>
        <div class="dash-hero-prog-wrap"><div class="dash-hero-prog-fill" style="width:${heroRoute._pct}%"></div></div>
        <div class="dash-hero-prog-label">${heroRoute._pct}% complete · ${heroRoute._done}/${heroRoute._total} stages</div>
        <div class="dash-hero-btns">
          <button class="dash-hero-btn dash-hero-btn-primary" onclick="goToRoute('${routeKey(heroRoute.land, heroRoute.route_id)}')">Continue →</button>
          <button class="dash-hero-btn dash-hero-btn-secondary" onclick="setView('routes')">View Routes</button>
        </div>
      </div>
    </div>` : `
    <div class="dash-hero">
      <img class="dash-hero-bg" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBE_Az3YmLRSe9g6TQdoT04O8ach6Lg5tNWi3qF77OkHE0XCCunKg4bp_2GreuRp91wSBAqgojyAdoYrelyulCX4MpGakVjvgJe4G14USJ7wKMPQz1biGJIdFm2VySzLhpsTwipKfHzHTC44JXRxdmpnNU-ei4hiAm2wLnEBEfmKGPqN5mqIFLA-AtGQgQlxBOr8ZOKpx7pJXtRW3BhH2TwkRMwFDEoO4L_ZzanH4Eor_8UeLTuWR4g20Svi0aGNSKhVfvWgVD-ObUC" alt="">
      <div class="dash-hero-inner">
        <div class="dash-hero-eyebrow">Current Expedition</div>
        <h2>Your Alpine Journey</h2>
        <div class="dash-hero-sub">Pick a route and start exploring Switzerland's best trails.</div>
        <div class="dash-hero-btns">
          <button class="dash-hero-btn dash-hero-btn-primary" onclick="setView('routes')">Explore Routes →</button>
        </div>
      </div>
    </div>`;

  // ── Next Up ──
  // Find the most recently active in-progress route's next stage
  const nextUpHtml = (() => {
    if (!inProgress.length) return '';
    // Pick route with most recent completion
    const withRecent = inProgress.map(r => {
      const lastTs = r.stages.reduce((best, s) => {
        const key = stageKey(r.land, r.route_id, s.stage_nr);
        if (!completed[key]) return best;
        const [dd, mm, yy] = completed[key].split('.');
        const ts = new Date(`${yy}-${mm}-${dd}`).getTime();
        return ts > best ? ts : best;
      }, 0);
      return { ...r, _lastTs: lastTs };
    }).sort((a, b) => b._lastTs - a._lastTs);
    const r = withRecent[0];
    if (!r || !r._next) return '';
    const s = r._next;
    const key = stageKey(r.land, r.route_id, s.stage_nr);
    const sbbTimes = (s.sbb_times || {})[selectedStation] || {};
    const startTravel = fmtMins(sbbTimes.start);
    const endTravel   = fmtMins(sbbTimes.end);
    const diff = s.difficulty;
    return `
    <div class="dash-next-up">
      <div class="dash-next-up-route">${r.land === 'cycle' ? '🚴' : '🥾'} ${r.name} · Stage ${s.stage_nr} of ${r._total}</div>
      <div class="dash-next-up-title">${s.start_name} → ${s.end_name}${s.via ? ` via ${s.via}` : ''}</div>
      <div class="dash-next-up-meta">
        ${s.dist_km ? `<span class="badge badge-gray">${fmtKm(s.dist_km)}</span>` : ''}
        ${s.elev_up ? `<span class="badge badge-gray">↑ ${s.elev_up.toLocaleString()} m</span>` : ''}
        ${s.duration_hrs ? `<span class="badge badge-gray">⏱ ${fmtHrs(s.duration_hrs)}</span>` : ''}
        ${diffClass(diff, r.land) ? `<span class="badge ${diffClass(diff, r.land)}">${DIFF_LABELS[canonDiff(diff, r.land)]}</span>` : ''}
        ${startTravel ? `<span class="badge badge-gray">🚆 ${startTravel} to start</span>` : ''}
        ${endTravel   ? `<span class="badge badge-gray">🚆 ${endTravel} home</span>` : ''}
      </div>
      <div class="dash-next-up-actions">
        <button class="dash-next-up-btn dash-next-up-btn-primary" onclick="toggleStage('${key}')">✓ Mark as done</button>
        <a href="${smUrl(r, s.stage_nr)}" target="_blank" rel="noopener" style="text-decoration:none">
          <button class="dash-next-up-btn dash-next-up-btn-secondary">↗ SchweizMobil</button>
        </a>
      </div>
    </div>`;
  })();

  // ── In-progress trail cards ──
  const trailCardsHtml = gridRoutes.length ? `
    <div class="dash-section-label">In Progress</div>
    <div class="dash-section-title">Your Trails</div>
    <div class="dash-grid">
      ${gridRoutes.map(r => `
        <div class="dash-trail-card" onclick="setView('routes')">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <span class="dash-trail-name">${r.name}</span>
            <span style="font-size:10px;font-weight:800;padding:3px 8px;border-radius:99px;background:${r.route_type==='national'?'#c1ecd4':'var(--gray-bg)'};color:${r.route_type==='national'?'#274e3d':'var(--muted)'};white-space:nowrap;flex-shrink:0;margin-left:8px">${r.route_type==='national'?'NATIONAL':'REGIONAL'}</span>
          </div>
          <div class="dash-trail-desc">${r.start} → ${r.end}</div>
          <div class="dash-trail-stats">
            <div><div class="dash-trail-stat-label">Distance</div><div class="dash-trail-stat-val">${r._km} km</div></div>
            <div><div class="dash-trail-stat-label">Stages</div><div class="dash-trail-stat-val">${r._total}</div></div>
            <div><div class="dash-trail-stat-label">Elev. Gain</div><div class="dash-trail-stat-val">${r._elev >= 1000 ? (r._elev/1000).toFixed(1)+'k' : r._elev} m</div></div>
          </div>
          <div class="dash-trail-prog-header">
            <span>Progress</span><span class="dash-trail-prog-pct">${r._pct}%</span>
          </div>
          <div class="dash-trail-prog-bar"><div class="dash-trail-prog-fill" style="width:${r._pct}%"></div></div>
          ${r._next ? `<div class="dash-trail-next">Next: ${r._next.start_name} → ${r._next.end_name}</div>` : ''}
        </div>`).join('')}
    </div>` : '';

  // ── Fun Stats (3-col) ──
  function distFun(km) {
    if (!km) return 'Start your first stage to begin tracking';
    if (km < 50)  return `${km} km — keep going!`;
    if (km < 200) return `Basel → Zurich is 80 km — you've done that ${(km/80).toFixed(1)}×`;
    if (km < 600) return `Basel → Munich is 350 km — you're ${Math.round(km/350*100)}% there`;
    if (km < 1000) return `You've nearly walked Basel → Rome (840 km)`;
    if (km < 2000) return `${(km/1860).toFixed(1)}× Basel → Lisbon`;
    return `${(km/40075*100).toFixed(2)}% of Earth's circumference`;
  }
  function elevFun(m) {
    if (!m) return 'Every metre counts';
    if (m < 330)  return `Eiffel Tower is 330 m — ${Math.round(m/330*100)}% there`;
    if (m < 8849) return `${(m/330).toFixed(1)} Eiffel Towers stacked`;
    if (m < 30000) return `${(m/8849).toFixed(1)}× the height of Everest`;
    return `${(m/8849).toFixed(0)} Everests — extraordinary`;
  }
  function descentFun(m) {
    if (!m) return 'Ready for the downhill';
    if (m < 500)  return `${m} m down so far`;
    if (m < 3883) return `Deepest mine is 3,883 m — ${Math.round(m/3883*100)}% there`;
    if (m < 11000) return `${(m/3883).toFixed(1)}× the world's deepest mine`;
    return `${(m/11000).toFixed(1)}× the depth of the Mariana Trench`;
  }
  const statsHtml = `
    <div class="dash-stats-row">
      <div class="dash-stat-card">
        <div class="dash-stat-eyebrow">Distance</div>
        <div><span class="dash-stat-num">${doneKm.toLocaleString()}</span><span class="dash-stat-unit"> km</span></div>
        <div class="dash-stat-fun">${distFun(doneKm)}</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-eyebrow">Total Ascent</div>
        <div><span class="dash-stat-num">${doneElev >= 1000 ? (doneElev/1000).toFixed(1)+'k' : doneElev}</span><span class="dash-stat-unit"> m ↑</span></div>
        <div class="dash-stat-fun">${elevFun(doneElev)}</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-eyebrow">Total Descent</div>
        <div><span class="dash-stat-num">${doneDescent >= 1000 ? (doneDescent/1000).toFixed(1)+'k' : doneDescent}</span><span class="dash-stat-unit"> m ↓</span></div>
        <div class="dash-stat-fun">${descentFun(doneDescent)}</div>
      </div>
    </div>`;

  // ── This Month ──
  const now = new Date();
  const thisMonth = now.getMonth() + 1;
  const thisYear  = now.getFullYear();
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthDone = doneFlat.filter(s => {
    const key = stageKey(s._land, s._routeId, s.stage_nr);
    const d = completed[key];
    if (!d) return false;
    const [dd, mm, yy] = d.split('.');
    return parseInt(mm) === thisMonth && parseInt(yy) === thisYear;
  });
  const monthKm = Math.round(monthDone.reduce((n, s) => n + (s.dist_km || 0), 0));
  const monthElev = Math.round(monthDone.reduce((n, s) => n + (s.elev_up || 0), 0));
  const thisMonthHtml = `
    <div class="dash-card">
      <div class="dash-card-eyebrow">${monthNames[thisMonth-1]} ${thisYear}</div>
      <div class="dash-month-num">${monthDone.length}</div>
      <div class="dash-month-label">${monthDone.length === 1 ? 'stage' : 'stages'} completed this month</div>
      ${monthDone.length ? `<div class="dash-month-divider">
        <div><div class="dash-month-sub-val">${monthKm}</div><div class="dash-month-sub-label">km</div></div>
        <div><div class="dash-month-sub-val">${monthElev >= 1000 ? (monthElev/1000).toFixed(1)+'k' : monthElev}</div><div class="dash-month-sub-label">m ↑</div></div>
        <div><div class="dash-month-sub-val">${doneCount}</div><div class="dash-month-sub-label">total stages</div></div>
      </div>` : `<div style="margin-top:10px;font-size:12px;color:var(--muted)">Get out there — the weather's waiting.</div>`}
    </div>`;

  // ── Almost There ──
  const almostRoutes = routesEnriched
    .filter(r => r.land === landFilter && r._done > 0 && r._total - r._done <= 2 && r._done < r._total)
    .sort((a, b) => (a._total - a._done) - (b._total - b._done));
  const almostHtml = almostRoutes.length ? `
    <div class="dash-card">
      <div class="dash-card-eyebrow">Almost There</div>
      ${almostRoutes.slice(0, 4).map(r => {
        const left = r._total - r._done;
        return `<div class="dash-almost-item">
          <div style="flex:1;min-width:0">
            <div class="dash-almost-name">${r.name}</div>
            <div class="dash-almost-prog"><div class="dash-almost-prog-fill" style="width:${r._pct}%"></div></div>
          </div>
          <div class="dash-almost-left">${left} stage${left > 1 ? 's' : ''} left</div>
        </div>`;
      }).join('')}
    </div>` : `
    <div class="dash-card">
      <div class="dash-card-eyebrow">Almost There</div>
      <div style="font-size:13px;color:var(--muted);padding:0.5rem 0">Complete more stages to see routes you're close to finishing.</div>
    </div>`;

  // ── Personal Bests ──
  const longestStage  = doneFlat.reduce((b, s) => (s.dist_km || 0) > (b?.dist_km || 0) ? s : b, null);
  const highestAscent = doneFlat.reduce((b, s) => (s.elev_up || 0) > (b?.elev_up || 0) ? s : b, null);
  const mostStagesMonth = (() => {
    const counts = {};
    doneFlat.forEach(s => {
      const key = stageKey(s._land, s._routeId, s.stage_nr);
      const d = completed[key];
      if (!d) return;
      const [, mm, yy] = d.split('.');
      const mk = `${yy}-${mm}`;
      counts[mk] = (counts[mk] || 0) + 1;
    });
    const best = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
    return best ? { monthKey: best[0], count: best[1] } : null;
  })();
  const pbHtml = doneFlat.length ? `
    <div class="dash-card">
      <div class="dash-card-eyebrow">Personal Bests</div>
      ${longestStage ? `<div class="dash-best-item">
        <div><div class="dash-best-label">Longest stage</div><div class="dash-best-sub">${longestStage.start_name} → ${longestStage.end_name}</div></div>
        <div class="dash-best-val">${longestStage.dist_km} km</div>
      </div>` : ''}
      ${highestAscent ? `<div class="dash-best-item">
        <div><div class="dash-best-label">Most ascent in one stage</div><div class="dash-best-sub">${highestAscent.start_name} → ${highestAscent.end_name}</div></div>
        <div class="dash-best-val">${highestAscent.elev_up.toLocaleString()} m</div>
      </div>` : ''}
      ${mostStagesMonth ? `<div class="dash-best-item">
        <div><div class="dash-best-label">Most active month</div><div class="dash-best-sub">${monthNames[parseInt(mostStagesMonth.monthKey.split('-')[1])-1]} ${mostStagesMonth.monthKey.split('-')[0]}</div></div>
        <div class="dash-best-val">${mostStagesMonth.count} stages</div>
      </div>` : ''}
      <div class="dash-best-item">
        <div><div class="dash-best-label">Stages completed</div></div>
        <div class="dash-best-val">${doneCount}</div>
      </div>
    </div>` : `
    <div class="dash-card">
      <div class="dash-card-eyebrow">Personal Bests</div>
      <div style="font-size:13px;color:var(--muted);padding:0.5rem 0">Complete stages to see your personal bests here.</div>
    </div>`;

  // ── Hike of the Day ──
  const allHikes = allRoutes.filter(r => r.land === 'hike');
  const todayIdx = Math.floor(Date.now() / 86400000) % (allHikes.length || 1);
  const hotdRoute = allHikes[todayIdx] || null;
  const hotdStage = hotdRoute ? hotdRoute.stages[Math.floor(hotdRoute.stages.length / 2)] : null;
  const hotdHtml = hotdRoute ? `
    <div class="dash-card">
      <div class="dash-card-eyebrow">Hike of the Day</div>
      <div class="dash-hotd-route">${hotdRoute.route_type === 'national' ? '★ ' : ''}${hotdRoute.name}</div>
      <div class="dash-hotd-name">${hotdStage ? `${hotdStage.start_name} → ${hotdStage.end_name}` : hotdRoute.start + ' → ' + hotdRoute.end}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        ${hotdStage?.dist_km ? `<span class="badge badge-gray">${fmtKm(hotdStage.dist_km)}</span>` : ''}
        ${hotdStage?.elev_up ? `<span class="badge badge-gray">↑ ${hotdStage.elev_up.toLocaleString()} m</span>` : ''}
        ${hotdStage?.difficulty && diffClass(hotdStage.difficulty, 'hike') ? `<span class="badge ${diffClass(hotdStage.difficulty,'hike')}">${DIFF_LABELS[canonDiff(hotdStage.difficulty,'hike')]}</span>` : ''}
      </div>
      ${hotdRoute.description ? `<div class="dash-hotd-desc">${hotdRoute.description}</div>` : ''}
    </div>` : '';

  // ── Season Card ──
  const seasonRoutes = allRoutes
    .filter(r => r.land === landFilter)
    .flatMap(r => r.stages.map(s => ({ s, r, info: seasonInfo(s, r.land) })))
    .filter(x => x.info)
    .slice(0, 5);
  const seasonHtml = seasonRoutes.length ? `
    <div class="dash-card">
      <div class="dash-card-eyebrow">Seasonal Conditions</div>
      ${seasonRoutes.map(({ s, r, info }) => `
        <div class="dash-season-item">
          <div style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.name}${r.stages.length > 1 ? ` · Stage ${s.stage_nr}` : ''}</div>
          <span class="${info.warn ? 'dash-season-warn' : 'dash-season-ok'}">${info.warn ? '⚠ ' : '✓ '}${info.label}</span>
        </div>`).join('')}
    </div>` : '';

  // ── Recent Activity ──
  const recentDone = [...doneFlat]
    .map(s => {
      const key = stageKey(s._land, s._routeId, s.stage_nr);
      const [dd, mm, yy] = (completed[key] || '01.01.2000').split('.');
      return { ...s, _key: key, _date: completed[key], _ts: new Date(`${yy}-${mm}-${dd}`) };
    })
