<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiss Hiking & Cycling Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:    #012d1d;
    --primary-lt: #1b4332;
    --secondary:  #496173;
    --tertiary:   #7a0000;
    --green:      #1D9E75;
    --green-bg:   #e4f5ed;
    --green-dark: #0F6E56;
    --red:        #c0392b;
    --red-bg:     #faeaea;
    --blue:       #185FA5;
    --blue-bg:    #E6F1FB;
    --blue-dark:  #0d3d6e;
    --amber:      #854F0B;
    --amber-bg:   #FAEEDA;
    --gray:       #5F5E5A;
    --gray-bg:    #eeece6;
    --cycle:      #1062C0;
    --cycle-bg:   #ddeeff;
    --cycle-dark: #0a3d80;
    --ghost:      rgba(25,28,29,0.07);
    --border:     rgba(25,28,29,0.10);
    --surface:    #ffffff;
    --surface-low:#f4f3ef;
    --page:       #f0eeea;
    --text:       #161614;
    --muted:      #6b6b67;
    --radius:     14px;
    --shadow:     0 2px 16px rgba(25,28,29,0.07), 0 1px 4px rgba(25,28,29,0.04);
    --shadow-lg:  0 12px 40px rgba(25,28,29,0.09), 0 2px 8px rgba(25,28,29,0.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface:    #1e1e1c;
      --surface-low:#181816;
      --page:       #111110;
      --text:       #e8e8e4;
      --muted:      #9a9a96;
      --ghost:      rgba(255,255,255,0.06);
      --border:     rgba(255,255,255,0.10);
      --gray-bg:    #252523;
      --green-bg:   #0a2a1e;
      --blue-bg:    #0a1e38;
      --amber-bg:   #2a1a06;
      --red-bg:     #2a0e0e;
      --cycle-bg:   #0a1e38;
      --shadow:     0 2px 16px rgba(0,0,0,0.3), 0 1px 4px rgba(0,0,0,0.2);
      --shadow-lg:  0 12px 40px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
      /* foreground text colors — lightened for readability on dark badge backgrounds */
      --green:      #3dcc96;
      --green-dark: #4dd6a3;
      --blue:       #6aadee;
      --blue-dark:  #5a9de0;
      --amber:      #e8a030;
      --gray:       #a8a8a4;
      --red:        #e07070;
      --cycle:      #7db4f0;
      --cycle-dark: #7db4f0;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--page); color: var(--text); font-size: 15px; line-height: 1.5; }
  a { color: var(--blue); }

  /* Layout */
  .app { max-width: 800px; margin: 0 auto; padding: 0 1rem 4rem; }

  /* Header */
  .header {
    position: relative;
    margin: 0 -1rem 1.75rem;
    padding: 2rem 1.5rem 0;
    background: linear-gradient(160deg, var(--primary) 0%, var(--primary-lt) 55%, #0d4530 100%);
    overflow: hidden;
    transition: background 0.5s ease;
  }
  .header--hike  { background: linear-gradient(160deg, #012d1d 0%, #1b4332 45%, #0d4530 100%) !important; }
  .header--cycle { background: linear-gradient(160deg, #011824 0%, #0a2845 50%, #0e3570 100%) !important; }
  /* Depth blobs — canopy light effect */
  .header::before {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 55% 70% at 15% 35%, rgba(29,158,117,0.22) 0%, transparent 65%),
      radial-gradient(ellipse 45% 55% at 85% 15%, rgba(16,98,192,0.16) 0%, transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(1,45,29,0.35) 0%, transparent 55%);
  }
  .header-inner { position: relative; padding-bottom: 1.5rem; }
  .header h1 {
    font-family: 'Manrope', sans-serif;
    font-size: 30px; font-weight: 800; letter-spacing: -0.02em;
    color: #fff; line-height: 1.15;
    text-shadow: 0 2px 16px rgba(0,0,0,0.35);
  }
  .header h1 span { opacity: 0.65; font-weight: 500; font-size: 17px; margin-left: 5px; letter-spacing: 0; font-family: 'Inter', sans-serif; }
  .header p  { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
  /* Mountain silhouette */
  .header-mountain {
    position: absolute; bottom: 0; left: 0; right: 0;
    width: 100%; height: 72px; pointer-events: none; display: block;
  }
  .header-controls {
    position: absolute; top: 1.1rem; right: 1.5rem;
    display: flex; flex-direction: column; gap: 6px; align-items: stretch;
  }
  .header-user { font-size: 10px; color: rgba(255,255,255,0.45); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
  .signout-btn {
    width: 34px; height: 34px; border-radius: 10px;
    background: rgba(255,255,255,0.08); border: none;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; cursor: pointer; transition: all 0.15s;
    color: rgba(255,255,255,0.65);
  }
  .signout-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
  .settings-btn {
    width: 34px; height: 34px; border-radius: 10px;
    background: rgba(255,255,255,0.08); border: none;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer; transition: all 0.15s;
    color: rgba(255,255,255,0.65);
  }
  .settings-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
  .settings-btn.active { background: rgba(255,255,255,0.22); color: #fff; }

  /* Settings panel — glassmorphism */
  .settings-panel {
    background: rgba(255,255,255,0.82); border: none;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow: var(--shadow-lg);
    border-radius: var(--radius); overflow: hidden;
    max-height: 0; opacity: 0;
    transition: max-height 0.3s ease, opacity 0.2s ease, margin 0.3s ease, padding 0.3s ease;
    padding: 0 1.25rem; margin-bottom: 0;
  }
  @media (prefers-color-scheme: dark) {
    .settings-panel { background: rgba(30,30,28,0.88); }
  }
  .settings-panel.open {
    max-height: 400px; opacity: 1;
    padding: 1rem 1.25rem; margin-bottom: 1.25rem;
  }
  .settings-section { margin-bottom: 1rem; }
  .settings-section:last-child { margin-bottom: 0; }
  .settings-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .settings-label strong { color: var(--text); text-transform: none; letter-spacing: 0; font-size: 13px; font-family: 'Manrope', sans-serif; }
  .settings-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .settings-pill {
    padding: 5px 14px; font-size: 13px; border: none;
    border-radius: 99px; background: var(--gray-bg); color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .settings-pill:hover { background: var(--green-bg); color: var(--green-dark); }
  .settings-pill.active { background: var(--primary); color: #fff; font-weight: 500; }
  #sbb-slider { width: 100%; accent-color: var(--green); cursor: pointer; margin-top: 6px; display: block; }
  /* Land toggle inside header */
  .header-toggle {
    display: flex; gap: 5px; margin-top: 1rem;
  }
  .header-tab {
    padding: 5px 15px; font-size: 13px; font-weight: 500;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 99px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all 0.15s;
  }
  .header-tab:hover { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); }
  .header-tab.active { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.6); color: #fff; font-weight: 600; }
  @media (prefers-color-scheme: dark) {
    .header        { background: linear-gradient(160deg, #010f09 0%, #041a10 50%, #030d1e 100%); }
    .header--hike  { background: linear-gradient(160deg, #010f09 0%, #041408 50%, #061510 100%) !important; }
    .header--cycle { background: linear-gradient(160deg, #010509 0%, #030c1e 50%, #050f28 100%) !important; }
  }

  /* Stats (inline in header) */
  .header-stats { display: flex; gap: 0; margin: 0.75rem 0 1.1rem; }
  .header-stat { flex: 1; padding: 0.5rem 0.85rem; border-left: 1px solid rgba(255,255,255,0.10); }
  .header-stat:first-child { border-left: none; padding-left: 0; }
  .header-stat-value { font-size: 20px; font-weight: 700; color: #fff; line-height: 1; font-family: 'Manrope', sans-serif; letter-spacing: -0.02em; }
  .header-stat-label { font-size: 9px; color: rgba(255,255,255,0.45); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Progress bar */
  .progress-wrap { background: var(--gray-bg); border-radius: 99px; height: 5px; margin-bottom: 1.5rem; overflow: visible; position: relative; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary-lt), var(--green)); border-radius: 99px; transition: width 0.4s ease; position: relative; }
  .progress-fill::after { content: ''; position: absolute; right: -3px; top: 50%; transform: translateY(-50%); width: 10px; height: 10px; background: var(--tertiary); border-radius: 50%; border: 2px solid var(--surface); box-shadow: 0 1px 4px rgba(0,0,0,0.2); }

  /* View toggle */
  .view-btn { padding: 6px 18px; font-size: 13px; font-weight: 500; border: none; border-radius: 10px; background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; box-shadow: 0 1px 3px rgba(25,28,29,0.06); }
  .view-btn:hover { color: var(--text); }
  .view-btn.active { background: var(--text); color: var(--surface); box-shadow: 0 2px 8px rgba(25,28,29,0.2); }

  /* Tabs + controls */
  .tabs { display: flex; gap: 5px; margin-bottom: 1rem; }
  .tab { padding: 6px 15px; font-size: 13px; border: none; border-radius: 99px; background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; box-shadow: 0 1px 3px rgba(25,28,29,0.06); }
  .tab:hover { background: var(--green-bg); color: var(--green-dark); }
  .tab.active { background: var(--primary); color: #fff; font-weight: 500; box-shadow: 0 2px 8px rgba(1,45,29,0.25); }

  .controls { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .controls input, .controls select {
    padding: 8px 12px; font-size: 14px; border: none; border-radius: 10px;
    background: var(--surface); color: var(--text); outline: none;
    box-shadow: 0 1px 3px rgba(25,28,29,0.07);
    transition: box-shadow 0.15s, background 0.15s;
  }
  .controls input { flex: 1; min-width: 200px; }
  .controls input:focus {
    background: var(--surface); box-shadow: 0 0 0 2px rgba(29,158,117,0.25), 0 1px 3px rgba(25,28,29,0.07);
  }
  .controls select:focus { box-shadow: 0 0 0 2px rgba(29,158,117,0.25), 0 1px 3px rgba(25,28,29,0.07); }

  /* Route cards */
  .route-list { display: flex; flex-direction: column; gap: 12px; }
  .route-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: box-shadow 0.2s; }
  .route-card:hover { box-shadow: var(--shadow-lg); }
  .route-header { padding: 1.1rem 1.25rem; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; }
  .route-header:hover { background: rgba(25,28,29,0.02); }

  .route-num { font-size: 11px; font-weight: 600; color: var(--muted); background: var(--gray-bg); border-radius: 5px; padding: 3px 7px; flex-shrink: 0; margin-top: 1px; }
  .mark-all-btn {
    font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 99px; cursor: pointer;
    border: none; color: var(--green-dark); background: var(--green-bg);
    transition: all 0.15s; white-space: nowrap;
  }
  .mark-all-btn:hover { background: var(--green); color: #fff; }
  .mark-all-btn--undo { color: var(--muted); background: var(--gray-bg); }
  .mark-all-btn--undo:hover { background: var(--muted); color: #fff; }
  .route-num.national      { background: var(--green-bg);  color: var(--green-dark); }
  .route-num.cycle         { background: var(--cycle-bg);  color: var(--cycle-dark); }
  .route-num.cycle.national{ background: var(--cycle-bg);  color: var(--cycle-dark); }
  .badge-cycle  { background: var(--cycle-bg);  color: var(--cycle-dark); }

  .route-meta { flex: 1; min-width: 0; }
  .route-name { font-size: 17px; font-weight: 700; font-family: 'Manrope', sans-serif; letter-spacing: -0.01em; }
  .route-sub  { font-size: 12px; color: var(--muted); margin-top: 3px; letter-spacing: 0.01em; }
  .route-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

  .badge { font-size: 12px; padding: 3px 8px; border-radius: 99px; font-weight: 400; white-space: nowrap; }
  .badge-green  { background: var(--green-bg);  color: var(--green-dark); }
  .badge-blue   { background: var(--blue-bg);   color: var(--blue); }
  .badge-amber  { background: var(--amber-bg);  color: var(--amber); }
  .badge-gray   { background: var(--gray-bg);   color: var(--gray); }
  .badge-red    { background: var(--red-bg);    color: var(--red); }

  .route-progress { margin-top: 10px; }
  .route-prog-bar { background: var(--gray-bg); border-radius: 99px; height: 4px; overflow: visible; position: relative; }
  .route-prog-fill { height: 100%; background: linear-gradient(90deg, var(--primary-lt), var(--green)); border-radius: 99px; transition: width 0.3s; position: relative; }
  .route-prog-fill::after { content: ''; position: absolute; right: -2px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; background: var(--tertiary); border-radius: 50%; border: 1.5px solid var(--surface); }
  .route-prog-label { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 0.01em; }

  .route-chevron { color: var(--muted); font-size: 14px; margin-top: 4px; flex-shrink: 0; transition: transform 0.2s; }
  .route-card.open .route-chevron { transform: rotate(180deg); }

  /* Stages */
  .stages { border-top: 1px solid var(--ghost); }
  .stage-row { display: flex; align-items: center; gap: 10px; padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--ghost); transition: background 0.1s; }
  .stage-row:last-child { border-bottom: none; }
  .stage-row:hover { background: rgba(25,28,29,0.025); }

  .stage-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: var(--surface); }
  .stage-check:hover { border-color: var(--green); }
  .stage-check.done { background: var(--green); border-color: var(--green); }
  .stage-check.done::after { content: ''; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: block; }

  .stage-info { flex: 1; min-width: 0; }
  .stage-title { font-size: 14px; font-weight: 500; }
  .stage-title.done-text { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--green); }
  .stage-places { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .stage-badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .stage-done-date { font-size: 11px; color: var(--green); margin-top: 2px; }


  /* Load more */
  .load-more { text-align: center; padding: 1.5rem; }
  .load-more button { padding: 9px 24px; border: none; border-radius: 99px; background: var(--surface); color: var(--muted); cursor: pointer; font-size: 14px; box-shadow: 0 1px 4px rgba(25,28,29,0.08); transition: all 0.15s; }
  .load-more button:hover { background: var(--green-bg); color: var(--green-dark); }

  /* Canton badges */
  .canton-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--gray-bg); border-radius: 99px; padding: 2px 7px 2px 6px; font-size: 11px; font-weight: 600; color: var(--muted); }
  .canton-badge img { border-radius: 2px; flex-shrink: 0; }

  /* Empty / loading states */
  .empty { text-align: center; padding: 4rem 1rem; color: var(--muted); }
  .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }
  .error-box { background: var(--red-bg); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 14px; color: var(--red); box-shadow: 0 2px 8px rgba(122,0,0,0.08); }
  .error-box code { font-family: monospace; font-size: 13px; background: rgba(192,57,43,0.1); padding: 2px 5px; border-radius: 4px; }


  /* SchweizMobil link */
  .sm-link { font-size:11px; color:var(--muted); text-decoration:none; opacity:0.6; flex-shrink:0; margin-left:2px; }
  .sm-link:hover { opacity:1; color:var(--green); }

  /* Next stage highlight */
  .stage-row.next-up { background: linear-gradient(90deg, rgba(29,158,117,0.06) 0%, transparent 100%); }
  .next-up-badge { font-size:10px; font-weight:600; color:var(--green); background:var(--green-bg); border-radius:4px; padding:1px 5px; margin-left:6px; vertical-align:middle; }

  /* Stage notes */
  .stage-note { width:100%; margin-top:6px; padding:6px 8px; font-size:12px; font-family:'Inter',inherit; color:var(--text); background:var(--gray-bg); border:none; border-bottom:2px solid transparent; border-radius:6px 6px 0 0; resize:none; outline:none; line-height:1.4; transition:border-color 0.15s, background 0.15s; min-height:32px; }
  .stage-note:focus { border-bottom-color:var(--green); background:var(--surface-low,var(--gray-bg)); }
  .stage-note::placeholder { color:var(--muted); }

  /* Star ratings */
  .stage-stars { display:flex; gap:1px; flex-shrink:0; align-self:center; }
  .stage-stars .star { font-size:18px; cursor:pointer; color: var(--border); transition: color 0.08s; line-height:1; user-select:none; }

  /* Wishlist heart */
  .stage-wish { width:22px; height:22px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--border); transition:color 0.12s; user-select:none; align-self:center; }
  .stage-wish:hover { color:#a29bfe; }
  .stage-wish.active { color:#6c5ce7; }
  .wish-route-btn { font-size:12px; padding:3px 10px; border-radius:99px; border:none; background:var(--gray-bg); cursor:pointer; color:var(--muted); transition:all 0.12s; white-space:nowrap; }
  .wish-route-btn:hover { background:rgba(162,155,254,0.15); color:#a29bfe; }
  .wish-route-btn.active { background:rgba(108,92,231,0.12); color:#6c5ce7; }

  /* Season warning badge */
  .badge-season      { background: var(--gray-bg);   color: var(--muted); }
  .badge-season-warn { background: var(--amber-bg);  color: var(--amber); font-weight: 500; }

  /* Surprise card */
  .surprise-card {
    background: var(--surface);
    border-radius: var(--radius); padding: 1.25rem 1.4rem;
    margin-bottom: 1.25rem;
    box-shadow: 0 0 0 2px rgba(29,158,117,0.2), var(--shadow-lg);
  }
  .surprise-header { display:flex; align-items:center; gap:10px; margin-bottom:0.75rem; }
  .surprise-label { font-size:10px; font-weight:700; color:var(--green); text-transform:uppercase; letter-spacing:0.05em; font-family:'Manrope',sans-serif; }
  .surprise-route { font-size:12px; color:var(--muted); margin-top:1px; }
  .surprise-title { font-size:18px; font-weight:700; margin-bottom:0.6rem; font-family:'Manrope',sans-serif; letter-spacing:-0.01em; }
  .surprise-actions { display:flex; gap:8px; margin-top:1rem; flex-wrap:wrap; }
  .surprise-btn { padding:7px 16px; font-size:13px; border-radius:99px; border:none; background:var(--gray-bg); color:var(--muted); cursor:pointer; transition:all 0.15s; }
  .surprise-btn:hover { background:var(--green-bg); color:var(--green-dark); }
  .surprise-btn-primary { background:var(--primary); color:#fff; font-weight:500; }
  .surprise-btn-primary:hover { background:var(--primary-lt); color:#fff; }

  /* Mobile */
  @media (max-width: 600px) {
    .app { padding: 0 0.6rem 4rem; }
    .header-stats { margin: 0.4rem 0 0.75rem; }
    .header-stat-value { font-size: 15px; }
    .header h1 { font-size: 22px; }
    .header-toggle { margin-top: 0.75rem; }
    .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; flex-wrap: nowrap; }
    .tab { white-space: nowrap; flex-shrink: 0; }
    .controls { flex-direction: column; }
    .controls input, .controls select { width: 100%; min-width: 0; }
    .route-header { padding: 0.75rem 1rem; }
    .stage-row { padding: 0.65rem 1rem; gap: 8px; }
    .route-num { font-size: 10px; }
    .stage-title { font-size: 13px; }
    .settings-panel.open { padding: 0.75rem 1rem; }
    .surprise-card { padding: 0.9rem 1rem; }
  }

  /* Difficulty colours — hiking */
  .diff-t1 { background: var(--green-bg);  color: var(--green-dark); }
  .diff-t2 { background: var(--blue-bg);   color: var(--blue); }
  .diff-t3 { background: var(--amber-bg);  color: var(--amber); }
  .diff-t4, .diff-t5, .diff-t6 { background: var(--red-bg); color: var(--red); }
  /* Difficulty colours — cycling (easy/medium/difficult) */
  .diff-easy       { background: var(--green-bg);  color: var(--green-dark); }
  .diff-medium     { background: var(--amber-bg);  color: var(--amber); }
  .diff-difficult  { background: var(--red-bg);    color: var(--red); }
</style>

<script>
// ---------------------------------------------------------------------------
// Supabase
// ---------------------------------------------------------------------------
const SUPABASE_URL = 'https://mpgkkmkvzgqkvtoearxp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4r3CSFeo9Pu6C3Q6qSs64Q_R2yqy6CN';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let allRoutes       = [];
let completed       = {};   // key: "land_routeId_stageNr" → date string
let ratings         = {};   // key: "land_routeId_stageNr" → 1–5
let notes           = {};   // key: "land_routeId_stageNr" → string
let wishlist        = {};   // key: "land_routeId_stageNr" → true
let expanded        = {};   // key: "land_routeId" → bool
let filter          = 'all';
let landFilter      = 'hike';
let viewMode        = 'routes';
let visible         = 20;
let selectedStation = 'Basel SBB';
let diffFilters     = { hike: '', cycle: '' };  // difficulty selection per land
let surpriseStage   = null;

// ---------------------------------------------------------------------------
// Persistence (Supabase)
// ---------------------------------------------------------------------------
function formatDateCH(isoDate) {
  // Convert "2026-04-06" to "06.04.2026"
  if (!isoDate) return '';
  const [y, m, d] = isoDate.split('-');
  return `${d}.${m}.${y}`;
}

function toISODate(chDate) {
  // Convert "06.04.2026" to "2026-04-06"
  if (!chDate) return null;
  const [d, m, y] = chDate.split('.');
  return `${y}-${m}-${d}`;
}

async function loadUserState() {
  const { data: rows } = await sb.from('user_state')
    .select('stage_key, completed_on, rating, note');
  completed = {};
  ratings   = {};
  notes     = {};
  wishlist  = {};
  for (const row of (rows || [])) {
    if (row.completed_on) completed[row.stage_key] = formatDateCH(row.completed_on);
    if (row.rating)       ratings[row.stage_key]   = row.rating;
    if (row.note)         notes[row.stage_key]      = row.note;
    if (row.wishlist)     wishlist[row.stage_key]   = true;
  }
  const { data: prefs } = await sb.from('user_preferences')
    .select('selected_station').maybeSingle();
  if (prefs?.selected_station) {
    selectedStation = prefs.selected_station;
  }
}

function saveState() {
  // No-op: persistence is handled by persistStage() at mutation sites
}

async function persistStage(key) {
  if (!currentUser) return;
  await sb.from('user_state').upsert({
    user_id:      currentUser.id,
    stage_key:    key,
    completed_on: toISODate(completed[key]) || null,
    rating:       ratings[key] || null,
    note:         notes[key]   || null,
    wishlist:     wishlist[key] || null,
    updated_at:   new Date().toISOString()
  }, { onConflict: 'user_id,stage_key' });
}

async function persistStation(val) {
  if (!currentUser) return;
  await sb.from('user_preferences').upsert(
    { user_id: currentUser.id, selected_station: val, updated_at: new Date().toISOString() },
    { onConflict: 'user_id' }
  );
}

let noteTimer = null;
function saveNote(key, val) {
  clearTimeout(noteTimer);
  noteTimer = setTimeout(() => {
    if (val.trim()) notes[key] = val.trim();
    else delete notes[key];
    persistStage(key);
  }, 500);
}

// ---------------------------------------------------------------------------
// Data loading
// ---------------------------------------------------------------------------
async function loadData() {
  const MAX_RETRIES = 4;
  const RETRY_DELAY_MS = 3000;

  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    try {
      if (attempt > 1) {
        document.getElementById('subtitle').textContent = `Connecting… (attempt ${attempt}/${MAX_RETRIES})`;
        await new Promise(r => setTimeout(r, RETRY_DELAY_MS));
      }

      // Fetch routes (well under 1000)
      const { data: routes, error: routesErr } = await sb.from('routes').select('*').limit(1000);
      if (routesErr) throw new Error(routesErr.message);

      // Fetch stages in pages of 1000 (Supabase hard cap per request)
      let stages = [], from = 0;
      while (true) {
        const { data: page, error: stagesErr } = await sb.from('stages').select('*').range(from, from + 999);
        if (stagesErr) throw new Error(stagesErr.message);
        stages = stages.concat(page);
        if (page.length < 1000) break;
        from += 1000;
      }

      // Empty result on first attempt likely means DB is waking up — retry
      if (!routes.length && attempt < MAX_RETRIES) continue;

      allRoutes = routes.map(r => ({
        route_id:    r.id,
        land:        r.land,
        route_type:  r.route_type,
        name:        r.name,
        description: r.description || '',
        start:       r.start_name || '',
        end:         r.end_name || '',
        total_km:    r.total_km,
        stages: stages
          .filter(s => s.route_id === r.id && s.land === r.land)
          .sort((a, b) => a.stage_nr - b.stage_nr),
      }));

      document.getElementById('error-area').innerHTML = '';
      updateSubtitle();
      document.getElementById('stats').style.display = 'grid';
      document.getElementById('progress-wrap').style.display = 'block';
      populateCantons();
      populateDifficulties();
      populateStations();
      updateStats();
      render();
      return;
    } catch(e) {
      if (attempt === MAX_RETRIES) showError(e.message);
    }
  }
}

function showError(msg) {
  document.getElementById('error-area').innerHTML = `
    <div class="error-box">
      <strong>Could not load route data</strong><br>
      ${msg}<br><br>
      <a href="#" onclick="loadData();return false;">Try again</a>
      &nbsp;·&nbsp;
      <a href="#" onclick="hardReset();return false;">Sign out &amp; reset</a>
    </div>`;
  document.getElementById('subtitle').textContent = 'Could not load data';
}

function hardReset() {
  localStorage.clear();
  sessionStorage.clear();
  window.location.href = window.location.pathname;
}

// ---------------------------------------------------------------------------
// Stats
// ---------------------------------------------------------------------------
function stageKey(land, routeId, stageNr) { return `${land}_${routeId}_${stageNr}`; }
function routeKey(land, routeId)          { return `${land}_${routeId}`; }

function smUrl(route, stageNr) {
  const activity = route.land === 'cycle' ? 'cycling-in-switzerland' : 'hiking-in-switzerland';
  const id = String(route.route_id).padStart(2, '0');
  const single = route.stages.length === 1;
  return single
    ? `https://schweizmobil.ch/en/${activity}/route-${id}`
    : `https://schweizmobil.ch/en/${activity}/route-${id}/stage-${stageNr}`;
}

function updateSbbSlider() {
  const val = parseInt(document.getElementById('sbb-slider').value);
  document.getElementById('sbb-slider-val').textContent = val >= 240 ? 'any' : fmtMins(val);
  visible = 20;
  render();
}

function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  const btn   = document.getElementById('settings-btn');
  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
}

function getSbbMax() {
  return parseInt(document.getElementById('sbb-slider')?.value ?? 240);
}

function stageBestSbb(stage) {
  const times = (stage.sbb_times || {})[selectedStation] || {};
  const startIsBasel = (stage.start_name || '').toLowerCase().startsWith('basel');
  const endIsBasel   = (stage.end_name   || '').toLowerCase().startsWith('basel');
  const vals = [
    startIsBasel ? 0 : times.start,
    endIsBasel   ? 0 : times.end,
  ].filter(n => n != null && n >= 0);
  return vals.length ? Math.min(...vals) : null;
}

function stageWithinSbb(stage, max) {
  if (max >= 240) return true;
  const best = stageBestSbb(stage);
  return best !== null && best <= max;
}

function populateCantons() {
  const all = [...new Set(allRoutes.flatMap(r => r.stages.flatMap(s => s.cantons || [])))].sort();
  const sel = document.getElementById('canton-filter');
  all.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
}

// Friendly labels for difficulty values
// Maps any raw API difficulty string → canonical value (lowercase, trimmed)
const DIFF_CANON = {
  // Hiking — Italian variants and capitalisation quirks
  'sentiero di montagna':            'mountain hiking trail',
  'mountain trail':                  'mountain hiking trail',
  // Cycling
  'easy':     'easy',
  'medium':   'medium',
  'difficult':'difficult',
};
function normalizeDiff(d) {
  if (!d) return null;
  const s = d.trim().toLowerCase();
  return DIFF_CANON[s] ?? s;
}

// Valid canonical difficulties per land — anything else is discarded
const VALID_DIFFS = {
  hike:  new Set(['hiking trail', 'mountain hiking trail', 'demanding mountain hiking trail', 'alpine hiking trail', 'demanding alpine hiking trail']),
  cycle: new Set(['easy', 'medium', 'difficult']),
};
function canonDiff(d, land) {
  const n = normalizeDiff(d);
  return (n && VALID_DIFFS[land]?.has(n)) ? n : null;
}

// Canonical value → display label
const DIFF_LABELS = {
  'hiking trail':                    'T1 · Hiking trail',
  'mountain hiking trail':           'T2 · Mountain hiking',
  'demanding mountain hiking trail': 'T3 · Demanding mountain',
  'alpine hiking trail':             'T4 · Alpine',
  'demanding alpine hiking trail':   'T5 · Demanding alpine',
  'easy':      'Easy',
  'medium':    'Medium',
  'difficult': 'Difficult',
};

function populateDifficulties() {
  const all = [...new Set(
    allRoutes.filter(r => r.land === landFilter)
             .flatMap(r => r.stages.map(s => canonDiff(s.difficulty, landFilter)))
             .filter(Boolean)
  )];
  const order = Object.keys(DIFF_LABELS);
  all.sort((a, b) => {
    const ai = order.indexOf(a), bi = order.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  const sel = document.getElementById('difficulty-filter');
  sel.innerHTML = '<option value="">All difficulties</option>';
  all.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = DIFF_LABELS[d] || d;
    sel.appendChild(opt);
  });
  sel.value = diffFilters[landFilter] || '';
}

function populateStations() {
  const stations = [...new Set(
    allRoutes.flatMap(r => r.stages.flatMap(s => Object.keys(s.sbb_times || {})))
  )].sort();
  const container = document.getElementById('station-pills');
  container.innerHTML = '';
  if (!stations.length) return;
  // Fall back to first available if saved station isn't in data yet
  if (!stations.includes(selectedStation)) {
    selectedStation = stations[0];
    persistStation(selectedStation);
  }
  stations.forEach(st => {
    const btn = document.createElement('button');
    btn.className = 'settings-pill' + (st === selectedStation ? ' active' : '');
    btn.textContent = st;
    btn.onclick = () => setStation(st);
    container.appendChild(btn);
  });
}

function setStation(val) {
  selectedStation = val;
  persistStation(val);
  document.querySelectorAll('.settings-pill').forEach(el =>
    el.classList.toggle('active', el.textContent === val)
  );
  render();
}

function updateSubtitle() {
  const vis = allRoutes.filter(r => r.land === landFilter);
  const stages = vis.reduce((s, r) => s + r.stages.length, 0);
  document.getElementById('subtitle').textContent = `${vis.length} routes · ${stages} stages`;
}

function updateStats() {
  const visRoutes  = allRoutes.filter(r => r.land === landFilter);
  const allStages  = visRoutes.flatMap(r => r.stages.map(s => ({...s, _land: r.land, _routeId: r.route_id})));
  const totalStages = allStages.length;
  const doneStages  = allStages.filter(s => completed[stageKey(s._land, s._routeId, s.stage_nr)]);
  const doneKm  = doneStages.reduce((s, st) => s + (st.dist_km || 0), 0);
  const totalKm = allStages.reduce((s, st) => s + (st.dist_km || 0), 0);
  const pct = totalStages ? Math.round(doneStages.length / totalStages * 100) : 0;

  document.getElementById('stat-done').textContent = `${doneStages.length} / ${totalStages}`;
  document.getElementById('stat-done-sub').textContent = `${pct}% of stages`;
  document.getElementById('stat-km').textContent = Math.round(doneKm).toLocaleString();
  document.getElementById('stat-remaining').textContent = Math.round(totalKm - doneKm).toLocaleString();
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ---------------------------------------------------------------------------
// Filtering + sorting
// ---------------------------------------------------------------------------
function setLand(l) {
  landFilter = l;
  visible = 20;
  ['hike','cycle'].forEach(x =>
    document.getElementById('header-land-' + x).classList.toggle('active', x === l)
  );
  const header = document.getElementById('main-header');
  header.classList.toggle('header--hike',  l === 'hike');
  header.classList.toggle('header--cycle', l === 'cycle');
  if (l === 'hike') {
    document.getElementById('header-title').textContent  = 'Swiss Hiking';
    document.getElementById('header-mode').textContent   = ' 🥾 Walking trails';
    document.getElementById('stat-km-label').textContent = 'km walked';
  } else {
    document.getElementById('header-title').textContent  = 'Swiss Cycling';
    document.getElementById('header-mode').textContent   = ' 🚴 Cycling routes';
    document.getElementById('stat-km-label').textContent = 'km cycled';
  }
  populateDifficulties();
  updateSubtitle();
  updateStats();
  render();
}

function setView(v) {
  viewMode = v;
  visible = 20;
  document.getElementById('view-routes').classList.toggle('active', v === 'routes');
  document.getElementById('view-stages').classList.toggle('active', v === 'stages');
  document.getElementById('sort').style.display       = v === 'routes' ? '' : 'none';
  document.getElementById('stage-sort').style.display = v === 'stages' ? '' : 'none';
  render();
}

function setFilter(f) {
  filter = f;
  visible = 20;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function filteredRoutes() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cantonFilter = document.getElementById('canton-filter').value;
  const diffFilter   = diffFilters[landFilter];
  const sbbMax       = getSbbMax();
  const sortBy = document.getElementById('sort').value;

  let routes = allRoutes.filter(r => {
    r.stages.forEach(s => { s._routeId = r.route_id; s._land = r.land; });

    if (landFilter !== 'all' && r.land !== landFilter) return false;
    if (filter === 'national') return r.route_type === 'national';
    if (filter === 'regional') return r.route_type === 'regional';
    if (filter === 'local')    return r.route_type === 'local';
    if (filter === 'nextup') {
      const hasDone = r.stages.some(s => completed[stageKey(r.land, r.route_id, s.stage_nr)]);
      const hasTodo = r.stages.some(s => !completed[stageKey(r.land, r.route_id, s.stage_nr)]);
      return hasDone && hasTodo;
    }
    if (filter === 'done') {
      return r.stages.some(s => completed[stageKey(r.land, r.route_id, s.stage_nr)]);
    }
    if (filter === 'todo') {
      return r.stages.some(s => !completed[stageKey(r.land, r.route_id, s.stage_nr)]);
    }
    if (filter === 'wishlist') {
      return r.stages.some(s => wishlist[stageKey(r.land, r.route_id, s.stage_nr)]);
    }
    return true;
  }).filter(r => {
    if (!cantonFilter) return true;
    return r.stages.some(s => (s.cantons || []).includes(cantonFilter));
  }).filter(r => {
    if (!diffFilter) return true;
    return r.stages.some(s => canonDiff(s.difficulty, r.land) === diffFilter);
  }).filter(r => {
    if (sbbMax >= 240) return true;
    return r.stages.some(s => stageWithinSbb(s, sbbMax));
  }).filter(r => {
    if (!q) return true;
    return r.name.toLowerCase().includes(q)
      || r.stages.some(s =>
          (s.start_name||'').toLowerCase().includes(q) ||
          (s.end_name||'').toLowerCase().includes(q));
  });

  if (sortBy === 'dist') {
    routes.sort((a, b) => {
      const aTot = a.stages.reduce((s,st) => s + (st.dist_km||0), 0);
      const bTot = b.stages.reduce((s,st) => s + (st.dist_km||0), 0);
      return aTot - bTot;
    });
  } else if (sortBy === 'sbb') {
    routes.sort((a, b) => {
      const minSbb = r => {
        const vals = r.stages.map(s => stageBestSbb(s)).filter(n => n != null);
        return vals.length ? Math.min(...vals) : Infinity;
      };
      return minSbb(a) - minSbb(b);
    });
  } else if (sortBy === 'alpha') {
    routes.sort((a, b) => a.name.localeCompare(b.name));
  } else {
    routes.sort((a, b) => a.route_id - b.route_id);
  }

  return routes;
}

function filteredStages() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cantonFilter = document.getElementById('canton-filter').value;
  const diffFilter   = diffFilters[landFilter];
  const sbbMax       = getSbbMax();
  const sortBy = document.getElementById('stage-sort').value;

  let stages = allRoutes.flatMap(r =>
    r.stages.map(s => ({ ...s, _route: r, _routeId: r.route_id, _land: r.land }))
  );

  // Pre-compute next-up stage keys for in-progress routes
  const nextUpKeys = new Set();
  allRoutes.filter(r => r.land === landFilter).forEach(r => {
    const sorted = [...r.stages].sort((a, b) => a.stage_nr - b.stage_nr);
    if (!sorted.some(s => completed[stageKey(r.land, r.route_id, s.stage_nr)])) return;
    const next = sorted.find(s => !completed[stageKey(r.land, r.route_id, s.stage_nr)]);
    if (next) nextUpKeys.add(stageKey(r.land, r.route_id, next.stage_nr));
  });

  stages = stages.filter(s => {
    if (s._land !== landFilter) return false;
    const rt = s._route.route_type;
    if (filter === 'national') return rt === 'national';
    if (filter === 'regional') return rt === 'regional';
    if (filter === 'local')    return rt === 'local';
    if (filter === 'nextup')   return nextUpKeys.has(stageKey(s._land, s._routeId, s.stage_nr));
    if (filter === 'done')     return !!completed[stageKey(s._land, s._routeId, s.stage_nr)];
    if (filter === 'todo')     return !completed[stageKey(s._land, s._routeId, s.stage_nr)];
    if (filter === 'wishlist') return !!wishlist[stageKey(s._land, s._routeId, s.stage_nr)];
    return true;
  });

  if (cantonFilter) stages = stages.filter(s => (s.cantons || []).includes(cantonFilter));
  if (diffFilter)   stages = stages.filter(s => canonDiff(s.difficulty, s._land) === diffFilter);
  if (sbbMax < 240) stages = stages.filter(s => stageWithinSbb(s, sbbMax));

  if (q) stages = stages.filter(s =>
    s._route.name.toLowerCase().includes(q) ||
    (s.start_name || '').toLowerCase().includes(q) ||
    (s.end_name   || '').toLowerCase().includes(q)
  );

  const bestSbb = s => stageBestSbb(s) ?? Infinity;

  if      (sortBy === 'sbb_asc')   stages.sort((a, b) => bestSbb(a) - bestSbb(b));
  else if (sortBy === 'sbb_desc')  stages.sort((a, b) => bestSbb(b) - bestSbb(a));
  else if (sortBy === 'dist_asc')  stages.sort((a, b) => (a.dist_km || 0) - (b.dist_km || 0));
  else if (sortBy === 'dist_desc') stages.sort((a, b) => (b.dist_km || 0) - (a.dist_km || 0));
  else if (sortBy === 'elev_desc') stages.sort((a, b) => (b.elev_up || 0) - (a.elev_up || 0));
  else if (sortBy === 'time_asc')  stages.sort((a, b) => (a.hiking_hrs || 99) - (b.hiking_hrs || 99));

  return stages;
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------
function diffClass(d, land) {
  const s = canonDiff(d, land);
  if (!s) return null;
  if (land === 'cycle') {
    if (s === 'easy')      return 'diff-easy';
    if (s === 'medium')    return 'diff-medium';
    if (s === 'difficult') return 'diff-difficult';
  }
  if (s === 'hiking trail')                    return 'diff-t1';
  if (s === 'mountain hiking trail')           return 'diff-t2';
  if (s === 'demanding mountain hiking trail') return 'diff-t3';
  if (s === 'alpine hiking trail')             return 'diff-t4';
  if (s === 'demanding alpine hiking trail')   return 'diff-t5';
  return null;
}

// ---------------------------------------------------------------------------
// Season warnings
// ---------------------------------------------------------------------------
const ALPINE_CANTONS = new Set(['VS', 'GR', 'UR', 'GL', 'OW', 'NW', 'TI', 'BE']);
const NOW_MONTH = new Date().getMonth() + 1; // 1–12

function seasonInfo(stage, land) {
  if (land !== 'hike') return null;
  const diff = canonDiff(stage.difficulty, 'hike');
  const inAlpine = (stage.cantons || []).some(c => ALPINE_CANTONS.has(c));
  if (diff === 'demanding alpine hiking trail' || diff === 'alpine hiking trail') {
    const warn = NOW_MONTH < 7 || NOW_MONTH > 9;
    return { label: 'Jul – Sep', warn };
  }
  if (diff === 'demanding mountain hiking trail') {
    const warn = NOW_MONTH < 6 || NOW_MONTH > 10;
    return { label: 'Jun – Oct', warn };
  }
  if (inAlpine && diff === 'mountain hiking trail') {
    const warn = NOW_MONTH < 5 || NOW_MONTH > 10;
    return { label: 'May – Oct', warn };
  }
  return null;
}

function surpriseMe() {
  const sbbMax = getSbbMax();
  const pool = allRoutes
    .filter(r => r.land === landFilter)
    .flatMap(r => {
      const sorted = [...r.stages].sort((a, b) => a.stage_nr - b.stage_nr);
      const isSingle = r.stages.length === 1;
      const hasDone  = sorted.some(s => completed[stageKey(r.land, r.route_id, s.stage_nr)]);
      const nextUp   = hasDone ? sorted.find(s => !completed[stageKey(r.land, r.route_id, s.stage_nr)]) : null;
      // Include: single-stage routes (not yet done), or next-up from in-progress routes
      const candidates = [];
      if (isSingle && !completed[stageKey(r.land, r.route_id, sorted[0].stage_nr)]) {
        candidates.push(sorted[0]);
      } else if (nextUp) {
        candidates.push(nextUp);
      }
      return candidates.map(s => ({ ...s, _route: r, _routeId: r.route_id, _land: r.land }));
    })
    .filter(s => !completed[stageKey(s._land, s._routeId, s.stage_nr)])
    .filter(s => sbbMax >= 240 || stageWithinSbb(s, sbbMax));
  if (!pool.length) return;
  surpriseStage = pool[Math.floor(Math.random() * pool.length)];
  render();
  document.getElementById('surprise-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderSurprise() {

  const s = surpriseStage;

  const key = stageKey(s._land, s._routeId, s.stage_nr);
  const sbbTimes = (s.sbb_times || {})[selectedStation] || {};
  const best = stageBestSbb(s);
  const sbbStr = best != null ? `🚆 ${fmtMins(best)} from ${selectedStation}` : '';

  const hrsStr  = s.duration_hrs ? fmtHrs(s.duration_hrs) : null;
  const season  = seasonInfo(s, s._land);
  const diff    = canonDiff(s.difficulty, s._land);
  const smLink  = smUrl(r, s.stage_nr);
  const done    = !!completed[key];
  return `<div class="surprise-card" id="surprise-anchor">
    <div class="surprise-header">
      <span style="font-size:22px">🎲</span>
      <div>
        <div class="surprise-label">Suggested for you</div>
        <div class="surprise-route">${r.land === 'cycle' ? '🚴' : '🥾'} ${r.name}</div>
      </div>
      <button class="surprise-btn" style="margin-left:auto" onclick="surpriseStage=null;render()">✕</button>
    </div>
    <div class="surprise-title ${done ? 'done-text' : ''}">${done ? '✓ ' : ''}${r.stages.length > 1 ? `Stage ${s.stage_nr}: ` : ''}${sbbTimes.start === null ? '🛏 ' : ''}${s.start_name || '?'} → ${s.end_name || '?'}${sbbTimes.end === null ? ' 🛏' : ''}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:0.5rem">
      ${distStr ? `<span class="badge badge-gray">${distStr}</span>` : ''}
      ${s.elev_up ? `<span class="badge badge-gray">↑ ${s.elev_up.toLocaleString()} m</span>` : ''}
      ${hrsStr   ? `<span class="badge badge-gray">⏱ ${hrsStr}</span>` : ''}
      ${diff && diffClass(s.difficulty, s._land) ? `<span class="badge ${diffClass(s.difficulty, s._land)}">${DIFF_LABELS[diff]}</span>` : ''}
      ${season   ? `<span class="badge ${season.warn ? 'badge-season-warn' : 'badge-season'}">❄ ${season.label}</span>` : ''}
      ${elevProfile(s.elev_up, s.elev_down)}
    </div>
    ${sbbStr ? `<div style="font-size:13px;color:var(--muted)">${sbbStr}</div>` : ''}
    <div class="surprise-actions">
      <a href="${smLink}" target="_blank" rel="noopener" class="surprise-btn surprise-btn-primary">View on SchweizMobil ↗</a>
      <button class="surprise-btn" onclick="surpriseMe()">Try another</button>
      <button class="surprise-btn ${done ? 'surprise-btn-primary' : ''}" onclick="toggleStage('${key}')">${done ? '✓ Done — undo?' : 'Mark as done'}</button>
    </div>
  </div>`;
}

function elevProfile(elevUp, elevDown) {
  const up = elevUp || 0, dn = elevDown || 0;
  if (up < 30 && dn < 30) return '';

  const total = up + dn;
  let icon;
  if      (total < 300)  icon = 'icon-1-meadow.svg';
  else if (total < 600)  icon = 'icon-2-rolling-hills.svg';
  else if (total < 1200) icon = 'icon-3-foothills.svg';
  else if (total < 2000) icon = 'icon-4-alpine.svg';
  else                   icon = 'icon-5-summit.svg';

  const upStr = up >= 30 ? `<span style="font-size:11px;color:var(--green-dark);white-space:nowrap">↑ ${up.toLocaleString()} m</span>` : '';
  const dnStr = dn >= 30 ? `<span style="font-size:11px;color:var(--muted);white-space:nowrap">↓ ${dn.toLocaleString()} m</span>` : '';

  return `<div style="display:flex;align-items:center;gap:4px;flex-shrink:0" title="↑ ${up.toLocaleString()} m  ↓ ${dn.toLocaleString()} m">
    ${upStr}
    <img src="assets/${icon}" width="34" height="34" style="border-radius:5px;display:block">
    ${dnStr}
  </div>`;
}

function fmtMins(mins) {
  if (!mins) return null;
  const h = Math.floor(mins / 60), m = mins % 60;
  return h === 0 ? `${m} min` : m === 0 ? `${h}h` : `${h}h ${m}m`;
}

function fmtHrs(hrs) {
  const h = Math.floor(hrs), m = Math.round((hrs - h) * 60);
  if (m === 0) return `${h}hr`;
  if (h === 0) return `${m}min`;
  return `${h}hr ${m}min`;
}

function fmtKm(km) {
  if (!km) return null;
  return km >= 10 ? Math.round(km) + ' km' : km.toFixed(1) + ' km';
}

function renderStages(route) {

  })();

  return `<div class="stages">` +
    route.stages.map(stage => {
      stage._routeId = route.route_id;
      stage._land    = route.land;
      const key  = stageKey(route.land, route.route_id, stage.stage_nr);
      const done = !!completed[key];
      const isNext = anyDone && !done && stage.stage_nr === nextStageNr;
      const distStr   = fmtKm(stage.dist_km);
      const diff = stage.difficulty;
      const viaStr = stage.via ? ` via ${stage.via}` : '';
      const hrsStr = stage.duration_hrs ? fmtHrs(stage.duration_hrs) : null;
      const sbbTimes    = (stage.sbb_times || {})[selectedStation] || {};
      const startTravel = fmtMins(sbbTimes.start);
      const endTravel   = fmtMins(sbbTimes.end);

      const smLink = smUrl(route, stage.stage_nr);

      const starsHtml = done ? `
        <div class="stage-stars" id="stars-${key}" onmouseleave="starsLeave('${key}')">
          ${[1,2,3,4,5].map(n => {
            const filled = (ratings[key]||0) >= n;
            return `<span class="star" style="color:${filled?'#f5a623':'var(--border)'}"
                         onmouseover="starsHover('${key}',${n})"
                         onclick="setRating('${key}',${n});event.stopPropagation()">★</span>`;
          }).join('')}
        </div>` : '';

      const wished = !!wishlist[key];
      return `<div class="stage-row${isNext ? ' next-up' : ''}">
        <div class="stage-check ${done ? 'done' : ''}"
             onclick="toggleStage('${key}')"
             title="${done ? 'Mark as incomplete' : 'Mark as done'}"></div>
        <div class="stage-info">
          <div class="stage-title ${done ? 'done-text' : ''}">${route.stages.length > 1 ? `Stage ${stage.stage_nr}: ` : ''}${sbbTimes.start === null ? '🛏 ' : ''}${stage.start_name || '?'} → ${stage.end_name || '?'}${sbbTimes.end === null ? ' 🛏' : ''}${viaStr}${isNext ? '<span class="next-up-badge">next up</span>' : ''}
            <a href="${smLink}" target="_blank" rel="noopener" class="sm-link" title="View on SchweizMobil" onclick="event.stopPropagation()">↗</a>
          </div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;align-items:center">
            ${distStr ? `<span class="badge badge-gray">${distStr}</span>` : ''}
            ${stage.elev_up ? `<span class="badge badge-gray">↑ ${stage.elev_up.toLocaleString()} m</span>` : ''}
            ${hrsStr ? `<span class="badge badge-gray">⏱ ${hrsStr}</span>` : ''}
            ${aspStr ? `<span class="badge badge-cycle">🛣 ${aspStr}</span>` : ''}
            ${diffClass(diff, route.land) ? `<span class="badge ${diffClass(diff, route.land)}">${DIFF_LABELS[canonDiff(diff, route.land)]}</span>` : ''}
            ${(() => { const s = seasonInfo(stage, route.land); return s ? `<span class="badge ${s.warn ? 'badge-season-warn' : 'badge-season'}">❄ ${s.label}</span>` : ''; })()}
            ${(stage.cantons||[]).map(c => `<span class="canton-badge"><span class="canton-code">${c}</span><img src="https://schweizmobil.ch/img/footer/${c.toLowerCase()}.svg" alt="${c}" width="14" height="14" onerror="this.style.display='none'"></span>`).join('')}
          </div>
          ${startTravel || endTravel ? `
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:var(--muted)">
            ${startTravel ? `<span>🚆 <strong>${stage.start_name}</strong> ${startTravel} from ${selectedStation}</span>` : ''}
            ${endTravel   ? `<span>🚆 <strong>${stage.end_name}</strong> ${endTravel} from ${selectedStation}</span>` : ''}
          </div>` : ''}
          ${done ? `<div class="stage-done-date">✓ Completed ${completed[key]}</div>
          <textarea class="stage-note" rows="1" placeholder="Add a note…"
            oninput="this.rows=Math.max(1,this.value.split('\\n').length);saveNote('${key}',this.value)"

function renderRoute(route) {
  route.stages.forEach(s => { s._routeId = route.route_id; s._land = route.land; });
  const totalStages = route.stages.length;
  const doneCount   = route.stages.filter(s => completed[stageKey(route.land, route.route_id, s.stage_nr)]).length;
  const totalKm     = route.stages.reduce((s, st) => s + (st.dist_km || 0), 0);
  const doneKm      = route.stages.filter(s => completed[stageKey(route.land, route.route_id, s.stage_nr)])
                                  .reduce((s, st) => s + (st.dist_km || 0), 0);
  const pct = totalStages ? Math.round(doneCount / totalStages * 100) : 0;
  const rkey  = routeKey(route.land, route.route_id);
  const isOpen = !!expanded[rkey];
  const isCycle = route.land === 'cycle';
  const numClass = [isCycle ? 'cycle' : '', route.route_type === 'national' ? 'national' : ''].filter(Boolean).join(' ');
  const routeCantons = [...new Set(route.stages.flatMap(s => s.cantons || []))];
  const icon = isCycle ? '🚴' : '🥾';

  return `<div class="route-card ${isOpen ? 'open' : ''}" id="route-${rkey}">
    <div class="route-header" onclick="toggleRoute('${rkey}')">

      <div class="route-meta">
        <div class="route-name">${icon} ${route.name || 'Route ' + route.route_id}</div>
        <div class="route-sub">${totalStages} stage${totalStages !== 1 ? 's' : ''} · ${Math.round(totalKm)} km total</div>
        <div class="route-badges">
          ${doneCount > 0 ? `<span class="badge badge-green">✓ ${doneCount}/${totalStages} done</span>` : ''}
        </div>
        ${routeCantons.length ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">
          ${routeCantons.map(c => `<span class="canton-badge"><span class="canton-code">${c}</span><img src="https://schweizmobil.ch/img/footer/${c.toLowerCase()}.svg" alt="${c}" width="16" height="16" onerror="this.style.display='none'"></span>`).join('')}
        </div>` : ''}
        ${doneCount > 0 ? `
        <div class="route-progress">
          <div class="route-prog-bar"><div class="route-prog-fill" style="width:${pct}%"></div></div>

        <span class="route-chevron">▾</span>
        ${doneCount < totalStages ? `<button class="mark-all-btn" onclick="markRouteComplete('${rkey}');event.stopPropagation()" title="Mark all stages complete">✓ All</button>` : `<button class="mark-all-btn mark-all-btn--undo" onclick="markRouteComplete('${rkey}',true);event.stopPropagation()" title="Unmark all stages">✕ All</button>`}
        ${(() => { const allWished = route.stages.every(s => wishlist[stageKey(route.land, route.route_id, s.stage_nr)]); return `<button class="wish-route-btn${allWished ? ' active' : ''}" onclick="wishlistRoute('${rkey}',${allWished});event.stopPropagation()" title="${allWished ? 'Remove route from wishlist' : 'Add all stages to wishlist'}">${allWished ? '♥' : '♡'} Wishlist</button>`; })()}
      </div>
    </div>

  </div>`;
}

        ${isCycle ? '🚴' : '🥾'} ${r.name}
      </div>
      <div class="stage-title ${done ? 'done-text' : ''}">${r.stages.length > 1 ? `Stage ${stage.stage_nr}: ` : ''}${sbbTimes.start === null ? '🛏 ' : ''}${stage.start_name || '?'} → ${stage.end_name || '?'}${sbbTimes.end === null ? ' 🛏' : ''}${viaStr}
        <a href="${smLink}" target="_blank" rel="noopener" class="sm-link" title="View on SchweizMobil" onclick="event.stopPropagation()">↗</a>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;align-items:center">
        ${distStr ? `<span class="badge badge-gray">${distStr}</span>` : ''}
        ${stage.elev_up ? `<span class="badge badge-gray">↑ ${stage.elev_up.toLocaleString()} m</span>` : ''}
        ${hrsStr ? `<span class="badge badge-gray">⏱ ${hrsStr}</span>` : ''}
        ${aspStr ? `<span class="badge badge-cycle">🛣 ${aspStr}</span>` : ''}
        ${diffClass(stage.difficulty, r.land) ? `<span class="badge ${diffClass(stage.difficulty, r.land)}">${DIFF_LABELS[canonDiff(stage.difficulty, r.land)]}</span>` : ''}
        ${(() => { const s = seasonInfo(stage, r.land); return s ? `<span class="badge ${s.warn ? 'badge-season-warn' : 'badge-season'}">❄ ${s.label}</span>` : ''; })()}
        ${(stage.cantons||[]).map(c => `<span class="canton-badge"><span class="canton-code">${c}</span><img src="https://schweizmobil.ch/img/footer/${c.toLowerCase()}.svg" alt="${c}" width="14" height="14" onerror="this.style.display='none'"></span>`).join('')}
      </div>
      ${startTravel || endTravel ? `
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:var(--muted)">
        ${startTravel ? `<span>🚆 <strong>${stage.start_name}</strong> ${startTravel} from ${selectedStation}</span>` : ''}
        ${endTravel   ? `<span>🚆 <strong>${stage.end_name}</strong> ${endTravel} from ${selectedStation}</span>` : ''}
      </div>` : ''}
      ${done ? `<div class="stage-done-date">✓ Completed ${completed[key]}</div>
      <textarea class="stage-note" rows="1" placeholder="Add a note…"
        oninput="this.rows=Math.max(1,this.value.split('\\n').length);saveNote('${key}',this.value)"
        onfocus="this.rows=Math.max(2,this.value.split('\\n').length)"
        onblur="if(!this.value.trim())this.rows=1"
      >${notes[key] || ''}</textarea>` : ''}
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;align-self:center">
      ${elevProfile(stage.elev_up, stage.elev_down)}
      ${starsHtml}
      <div class="stage-wish${wished ? ' active' : ''}" onclick="toggleWishlist('${key}')" title="${wished ? 'Remove from wishlist' : 'Add to wishlist'}">${wished ? '♥' : '♡'}</div>
    </div>
  </div>`;
}

function render() {
  const list = document.getElementById('route-list');
  const btn  = document.getElementById('load-more');
  document.getElementById('surprise-wrap').innerHTML = renderSurprise();

  if (viewMode === 'stages') {
    const stages = filteredStages();
    const slice  = stages.slice(0, visible);
    list.innerHTML = slice.length
      ? `<div class="route-card">${slice.map(renderFlatStage).join('')}</div>`
      : '<div class="empty">No stages match your filter.</div>';
    btn.style.display = stages.length > visible ? 'block' : 'none';
  } else {
    const routes = filteredRoutes();
    const slice  = routes.slice(0, visible);
    list.innerHTML = slice.length ? slice.map(renderRoute).join('') : '<div class="empty">No routes match your filter.</div>';
    btn.style.display = routes.length > visible ? 'block' : 'none';
  }
}

function showMore() {
  visible += 20;
  render();
}

// ---------------------------------------------------------------------------
// Interactions
// ---------------------------------------------------------------------------
function toggleRoute(rkey) {
  expanded[rkey] = !expanded[rkey];
  render();
}

function toggleWishlist(key) {
  event.stopPropagation();
  if (wishlist[key]) delete wishlist[key];
  else wishlist[key] = true;
  persistStage(key);
  render();
}

function wishlistRoute(rkey, undo = false) {
  const [land, routeIdStr] = rkey.split('_');
  const routeId = parseInt(routeIdStr);
  const route = allRoutes.find(r => r.land === land && r.route_id === routeId);
  if (!route) return;
  route.stages.forEach(s => {
    const key = stageKey(land, routeId, s.stage_nr);
    if (undo) { delete wishlist[key]; }
    else { wishlist[key] = true; }
    persistStage(key);
  });
  render();
}

function toggleStage(key) {
  event.stopPropagation();
  if (completed[key]) {
    delete completed[key];
    delete ratings[key];
    persistStage(key);
  } else {
    completed[key] = new Date().toLocaleDateString('de-CH');
    persistStage(key);
  }
  saveState();
  updateStats();
  render();
}

function markRouteComplete(rkey, undo = false) {
  const [land, routeIdStr] = rkey.split('_');
  const routeId = parseInt(routeIdStr);
  const route = allRoutes.find(r => r.land === land && r.route_id === routeId);
  if (!route) return;
  const today = new Date().toLocaleDateString('de-CH');
  route.stages.forEach(s => {
    const key = stageKey(land, routeId, s.stage_nr);
    if (undo) {
      delete completed[key];
      delete ratings[key];
      persistStage(key);
    } else if (!completed[key]) {
      completed[key] = today;
      persistStage(key);
    }
  });
  updateStats();
  render();
}

function starsHover(key, n) {
  const container = document.getElementById('stars-' + key);
  if (!container) return;
  container.querySelectorAll('.star').forEach((el, i) => {
    el.style.color = i < n ? '#f5a623' : 'var(--border)';
  });
}

function starsLeave(key) {
  const container = document.getElementById('stars-' + key);
  if (!container) return;
  const saved = ratings[key] || 0;
  container.querySelectorAll('.star').forEach((el, i) => {
    el.style.color = i < saved ? '#f5a623' : 'var(--border)';
  });
}

function setRating(key, n) {
  // Clicking current rating clears it (toggle off)
  if (ratings[key] === n) {
    delete ratings[key];
  } else {
    ratings[key] = n;
  }
  persistStage(key);
  starsLeave(key);
}

// ---------------------------------------------------------------------------
// Auth
// ---------------------------------------------------------------------------
const PROD_URL = 'https://jclift-dev.github.io/hiking-tracker/';
const APP_URL  = location.hostname === 'localhost' ? `${location.origin}/` : PROD_URL;

function showLoginForm() {
  document.getElementById('auth-login').style.display = 'flex';
  document.getElementById('auth-reset').style.display = 'none';
  document.getElementById('auth-newpass').style.display = 'none';
}
function showResetForm() {
  document.getElementById('auth-login').style.display = 'none';
  document.getElementById('auth-reset').style.display = 'flex';
  document.getElementById('auth-newpass').style.display = 'none';
}

async function sendReset() {
  const email  = document.getElementById('auth-reset-email').value.trim();
  const errEl  = document.getElementById('auth-reset-error');
  const sentEl = document.getElementById('auth-reset-sent');
  errEl.style.display = 'none';
  sentEl.style.display = 'none';
  if (!email) { errEl.textContent = 'Please enter your email.'; errEl.style.display = 'block'; return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: APP_URL });
  if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; }
  else sentEl.style.display = 'block';
}

async function setNewPassword() {
  const password = document.getElementById('auth-newpass-input').value;
  const errEl    = document.getElementById('auth-newpass-error');
  errEl.style.display = 'none';
  if (!password) { errEl.textContent = 'Please enter a password.'; errEl.style.display = 'block'; return; }
  const { error } = await sb.auth.updateUser({ password });
  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
  } else {
    _inPasswordRecovery = false;
    showLoginForm();
  }
}

async function signIn() {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl    = document.getElementById('auth-error');
  errEl.style.display = 'none';
  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.style.display = 'block';
    return;
  }
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
  }
}

async function logout() {
  _inPasswordRecovery = false;
  _booting = false;
  _loggingOut = true;
  allRoutes = [];
  try { await sb.auth.signOut(); } catch(e) { /* ignore — force UI reset regardless */ }
  document.getElementById('auth-screen').style.display = 'flex';
  document.querySelector('.app').style.display = 'none';
  showLoginForm();
  setTimeout(() => { _loggingOut = false; }, 2000);
}

async function migrateFromLocalStorage() {
  const legacyDone    = JSON.parse(localStorage.getItem('hikes_done')    || '{}');
  const legacyRatings = JSON.parse(localStorage.getItem('hikes_ratings') || '{}');
  const legacyNotes   = JSON.parse(localStorage.getItem('hikes_notes')   || '{}');
  if (!Object.keys(legacyDone).length) return;

  const { count } = await sb.from('user_state')
    .select('*', { count: 'exact', head: true });
  if (count > 0) return; // already migrated

  // Migrate old keys (routeId_stageNr) → new keys (hike_routeId_stageNr)
  for (const obj of [legacyDone, legacyRatings, legacyNotes]) {
    for (const key of Object.keys(obj)) {
      if (!key.startsWith('hike_') && !key.startsWith('cycle_')) {
        obj['hike_' + key] = obj[key];
        delete obj[key];
      }
    }
  }

  const rows = Object.keys(legacyDone).map(key => ({
    user_id:      currentUser.id,
    stage_key:    key,
    completed_on: toISODate(legacyDone[key]) || null,
    rating:       legacyRatings[key] || null,
    note:         legacyNotes[key]   || null,
  }));
  await sb.from('user_state').upsert(rows, { onConflict: 'user_id,stage_key' });
  localStorage.removeItem('hikes_done');
  localStorage.removeItem('hikes_ratings');
  localStorage.removeItem('hikes_notes');
  console.log(`Migrated ${rows.length} stages from localStorage`);
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
const DEV_MODE = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

// Emergency escape hatch — ?reset clears all storage and reloads clean
if (new URLSearchParams(location.search).has('reset')) {
  localStorage.clear();
  sessionStorage.clear();
  window.location.replace(location.pathname);
}

let _booting = false;
let _inPasswordRecovery = false;
let _loggingOut = false;

sb.auth.onAuthStateChange(async (event, session) => {
  const user = session?.user ?? null;

  // Ignore token refreshes if already loaded — avoids wiping routes mid-session
  if (event === 'TOKEN_REFRESHED' && allRoutes.length > 0) return;

  // Password recovery — show set-password form, block any app boot until done
  if (event === 'PASSWORD_RECOVERY') {
    _inPasswordRecovery = true;
    document.getElementById('auth-screen').style.display = 'flex';
    document.querySelector('.app').style.display = 'none';
    document.getElementById('auth-login').style.display = 'none';
    document.getElementById('auth-reset').style.display = 'none';
    document.getElementById('auth-newpass').style.display = 'flex';
    return;
  }

  // Block all events while logout is in progress
  if (_loggingOut) return;

  // Always handle sign-out, even during password recovery
  if (!user && !DEV_MODE) {
    _inPasswordRecovery = false;
    _booting = false;
    document.getElementById('auth-screen').style.display = 'flex';
    document.querySelector('.app').style.display = 'none';
    showLoginForm();
    return;
  }

  // Don't boot the app while the user is setting a new password
  if (_inPasswordRecovery) return;

  // Prevent concurrent boot sequences
  if (_booting) return;
  _booting = true;

  try {
    currentUser = user;
    if (currentUser || DEV_MODE) {
      document.getElementById('auth-screen').style.display = 'none';
      document.querySelector('.app').style.display = '';
      const emailEl = document.getElementById('header-user');
      if (emailEl) emailEl.textContent = currentUser?.email?.split('@')[0] || '';
      if (currentUser) {
        await migrateFromLocalStorage();
        await loadUserState();
      }
      await loadData();
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
      document.querySelector('.app').style.display = 'none';
    }
  } finally {
    _booting = false;
  }
});

document.getElementById('auth-password')
  ?.addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
</script>
