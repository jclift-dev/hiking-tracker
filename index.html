function render() {
  const list = document.getElementById('route-list');
  const btn  = document.getElementById('load-more');
  document.getElementById('surprise-wrap').innerHTML = renderSurprise();

  if (viewMode === 'dashboard') {
    list.innerHTML = renderDashboard();
    btn.style.display = 'none';
  } else if (viewMode === 'stages') {
    const stages = filteredStages();
    const slice  = stages.slice(0, visible);
    list.innerHTML = slice.length
      ? `<div class="route-card">${slice.map(renderFlatStage).join('')}</div>`
      : '<div class="empty">No stages match your filter.</div>';
    btn.style.display = stages.length > visible ? 'block' : 'none';
  } else {
    const routes = filteredRoutes();
    const slice  = routes.slice(0, visible);
    list.innerHTML = slice.length ? slice.map(renderRoute).join('') : '<div class="empty">No routes match your filter.</div>';
    btn.style.display = routes.length > visible ? 'block' : 'none';
  }
}

function showMore() {
  visible += 20;
  render();
}

// ---------------------------------------------------------------------------
// Interactions
// ---------------------------------------------------------------------------
function toggleRoute(rkey) {
  expanded[rkey] = !expanded[rkey];
  render();
}

function toggleWishlist(key) {
  event.stopPropagation();
  if (wishlist[key]) delete wishlist[key];
  else wishlist[key] = true;
  persistStage(key);
  render();
}

function wishlistRoute(rkey, undo = false) {
  const [land, routeIdStr] = rkey.split('_');
  const routeId = parseInt(routeIdStr);
  const route = allRoutes.find(r => r.land === land && r.route_id === routeId);
  if (!route) return;
  route.stages.forEach(s => {
    const key = stageKey(land, routeId, s.stage_nr);
    if (undo) { delete wishlist[key]; }
    else { wishlist[key] = true; }
    persistStage(key);
  });
  render();
}

function toggleStage(key) {
  event.stopPropagation();
  if (completed[key]) {
    delete completed[key];
    delete ratings[key];
    persistStage(key);
  } else {
    completed[key] = new Date().toLocaleDateString('de-CH');
    persistStage(key);
  }
  saveState();
  updateStats();
  render();
}

function markRouteComplete(rkey, undo = false) {
  const [land, routeIdStr] = rkey.split('_');
  const routeId = parseInt(routeIdStr);
  const route = allRoutes.find(r => r.land === land && r.route_id === routeId);
  if (!route) return;
  const today = new Date().toLocaleDateString('de-CH');
  route.stages.forEach(s => {
    const key = stageKey(land, routeId, s.stage_nr);
    if (undo) {
      delete completed[key];
      delete ratings[key];
      persistStage(key);
    } else if (!completed[key]) {
      completed[key] = today;
      persistStage(key);
    }
  });
  updateStats();
  render();
}

function starsHover(key, n) {
  const container = document.getElementById('stars-' + key);
  if (!container) return;
  container.querySelectorAll('.star').forEach((el, i) => {
    el.style.color = i < n ? '#f5a623' : 'var(--border)';
  });
}

function starsLeave(key) {
  const container = document.getElementById('stars-' + key);
  if (!container) return;
  const saved = ratings[key] || 0;
  container.querySelectorAll('.star').forEach((el, i) => {
    el.style.color = i < saved ? '#f5a623' : 'var(--border)';
  });
}

function setRating(key, n) {
  // Clicking current rating clears it (toggle off)
  if (ratings[key] === n) {
    delete ratings[key];
  } else {
    ratings[key] = n;
  }
  persistStage(key);
  starsLeave(key);
}

// ---------------------------------------------------------------------------
// Auth
// ---------------------------------------------------------------------------
const PROD_URL = 'https://jclift-dev.github.io/hiking-tracker/';
const APP_URL  = location.hostname === 'localhost' ? `${location.origin}/` : PROD_URL;

function showLoginForm() {
  document.getElementById('auth-login').style.display = 'flex';
  document.getElementById('auth-reset').style.display = 'none';
  document.getElementById('auth-newpass').style.display = 'none';
}
function showResetForm() {
  document.getElementById('auth-login').style.display = 'none';
  document.getElementById('auth-reset').style.display = 'flex';
  document.getElementById('auth-newpass').style.display = 'none';
}

async function sendReset() {
  const email  = document.getElementById('auth-reset-email').value.trim();
  const errEl  = document.getElementById('auth-reset-error');
  const sentEl = document.getElementById('auth-reset-sent');
  errEl.style.display = 'none';
  sentEl.style.display = 'none';
  if (!email) { errEl.textContent = 'Please enter your email.'; errEl.style.display = 'block'; return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: APP_URL });
  if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; }
  else sentEl.style.display = 'block';
}

async function setNewPassword() {
  const password = document.getElementById('auth-newpass-input').value;
  const errEl    = document.getElementById('auth-newpass-error');
  errEl.style.display = 'none';
  if (!password) { errEl.textContent = 'Please enter a password.'; errEl.style.display = 'block'; return; }
  const { error } = await sb.auth.updateUser({ password });
  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
  } else {
    _inPasswordRecovery = false;
    showLoginForm();
  }
}

async function signIn() {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl    = document.getElementById('auth-error');
  errEl.style.display = 'none';
  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.style.display = 'block';
    return;
  }
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
  }
}

async function logout() {
  try { await sb.auth.signOut(); } catch(e) {}
  window.location.reload();
}

async function migrateFromLocalStorage() {
  const legacyDone    = JSON.parse(localStorage.getItem('hikes_done')    || '{}');
  const legacyRatings = JSON.parse(localStorage.getItem('hikes_ratings') || '{}');
  const legacyNotes   = JSON.parse(localStorage.getItem('hikes_notes')   || '{}');
  if (!Object.keys(legacyDone).length) return;

  const { count } = await sb.from('user_state')
    .select('*', { count: 'exact', head: true });
  if (count > 0) return; // already migrated

  // Migrate old keys (routeId_stageNr) → new keys (hike_routeId_stageNr)
  for (const obj of [legacyDone, legacyRatings, legacyNotes]) {
    for (const key of Object.keys(obj)) {
      if (!key.startsWith('hike_') && !key.startsWith('cycle_')) {
        obj['hike_' + key] = obj[key];
        delete obj[key];
      }
    }
  }

  const rows = Object.keys(legacyDone).map(key => ({
    user_id:      currentUser.id,
    stage_key:    key,
    completed_on: toISODate(legacyDone[key]) || null,
    rating:       legacyRatings[key] || null,
    note:         legacyNotes[key]   || null,
  }));
  await sb.from('user_state').upsert(rows, { onConflict: 'user_id,stage_key' });
  localStorage.removeItem('hikes_done');
  localStorage.removeItem('hikes_ratings');
  localStorage.removeItem('hikes_notes');
  console.log(`Migrated ${rows.length} stages from localStorage`);
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
const DEV_MODE = false;

// Emergency escape hatch — ?reset clears all storage and reloads clean
if (new URLSearchParams(location.search).has('reset')) {
  localStorage.clear();
  sessionStorage.clear();
  window.location.replace(location.pathname);
}

let _booting = false;
let _inPasswordRecovery = false;
let _loggingOut = false;

sb.auth.onAuthStateChange(async (event, session) => {
  const user = session?.user ?? null;

  // Ignore token refreshes if already loaded — avoids wiping routes mid-session
  if (event === 'TOKEN_REFRESHED' && allRoutes.length > 0) return;

  // Password recovery — show set-password form, block any app boot until done
  if (event === 'PASSWORD_RECOVERY') {
    _inPasswordRecovery = true;
    document.getElementById('auth-screen').style.display = 'flex';
    document.querySelector('.app').style.display = 'none';
    document.getElementById('auth-login').style.display = 'none';
    document.getElementById('auth-reset').style.display = 'none';
    document.getElementById('auth-newpass').style.display = 'flex';
    return;
  }

  // Block all events while logout is in progress
  if (_loggingOut) return;

  // Always handle sign-out, even during password recovery
  if (!user && !DEV_MODE) {
    _inPasswordRecovery = false;
    _booting = false;
    document.getElementById('auth-screen').style.display = 'flex';
    document.querySelector('.app').style.display = 'none';
    showLoginForm();
    return;
  }

  // Don't boot the app while the user is setting a new password
  if (_inPasswordRecovery) return;

  // Prevent concurrent boot sequences
  if (_booting) return;
  _booting = true;

  try {
    currentUser = user;
    if (currentUser || DEV_MODE) {
      document.getElementById('auth-screen').style.display = 'none';
      document.querySelector('.app').style.display = '';
      const emailEl = document.getElementById('header-user');
      if (emailEl) emailEl.textContent = currentUser?.email?.split('@')[0] || '';
      if (currentUser) {
        await migrateFromLocalStorage();
        await loadUserState();
      }
      await loadData();
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
      document.querySelector('.app').style.display = 'none';
    }
  } finally {
    _booting = false;
  }
});

document.getElementById('auth-password')
  ?.addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
</script>
