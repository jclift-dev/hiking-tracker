  </defs>
  <rect x="0" y="0" width="80" height="80" rx="10" fill="#534AB7" stroke="#3C3489" stroke-width="1"/>
  <!-- Sharp summit -->
  <path d="M0,100 L0,62 Q8,45 18,32 Q26,18 35,5 Q44,18 52,32 Q62,45 70,62 L80,100Z" fill="#B4B2A9" clip-path="url(#clip)"/>
