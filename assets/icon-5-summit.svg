  <!-- Snow cap -->
  <path d="M29,10 Q32,2 35,5 Q38,2 41,10 Q38,16 35,17 Q32,16 29,10Z" fill="white" clip-path="url(#clip)"/>
  <!-- Cloud wisps -->
